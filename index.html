<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RutaViva - Experiències Gamificades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Simulació de l'entorn A-Frame per poder carregar el compilador de MindAR sense alterar la interfície gràfica -->
    <script>
        window.AFRAME = {
            registerComponent: function() {},
            registerSystem: function() {},
            registerPrimitive: function() {},
            registerGeometry: function() {},
            registerShader: function() {},
            components: {},
            systems: {}
        };
        const originalConsoleError = console.error;
        console.error = function(...args) {
            const msg = args.join(' ');
            if (msg.includes('is not valid JSON') || msg.includes('Unexpected token') || msg.includes('404')) return; 
            originalConsoleError.apply(console, args);
        };
        window.addEventListener('unhandledrejection', function(event) {
            if (event.reason && (event.reason.toString().includes('JSON') || event.reason.toString().includes('Unexpected token'))) {
                event.preventDefault(); 
            }
        });
    </script>
    <script type="module">
        import { Compiler } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js';
        window.MindARCompiler = Compiler;
    </script>

    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; color: #0f172a; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 0.5rem; }
        .video-container iframe, .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        model-viewer { width: 100%; height: 300px; background-color: #f1f5f9; border-radius: 0.75rem; border: 1px solid #e2e8f0; }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        /* Simulador Mòbil */
        .mobile-simulator {
            width: 320px;
            height: 568px;
            border-radius: 2.5rem;
            border: 12px solid #0f172a;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            background: #f8fafc;
            overflow-y: auto;
            position: relative;
        }
        .mobile-simulator::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="app" class="min-h-screen flex flex-col relative z-0"></div>
    <div id="modal-container" class="relative z-[50]"></div>
    <div id="dialog-container" class="relative z-[200]"></div>

    <div id="ar-fullscreen-container" class="fixed inset-0 z-[100] hidden bg-black flex flex-col">
        <video id="ar-video-feed" class="absolute inset-0 w-full h-full object-cover" autoplay playsinline></video>
        <div id="ar-scan-ui" class="absolute inset-0 flex flex-col items-center justify-center z-10">
            <div id="ar-ghost-container" class="relative w-72 h-72 border-4 border-dashed border-white/70 rounded-2xl overflow-hidden mb-6 bg-black/20 backdrop-blur-sm flex items-center justify-center shadow-[0_0_0_9999px_rgba(0,0,0,0.7)]">
                <img id="ar-ghost-image" src="" class="opacity-50 max-w-full max-h-full object-contain pointer-events-none" alt="Alinear imatge">
                <div id="ar-scan-line" class="hidden w-full h-1.5 bg-emerald-400 absolute top-0 shadow-[0_0_15px_rgba(52,211,153,1)] animate-[scan_2s_ease-in-out_infinite]"></div>
            </div>
            <p id="ar-instruction-text" class="text-white text-lg font-bold mb-6 bg-black/70 backdrop-blur px-6 py-3 rounded-full text-center max-w-xs">
                Cercant la imatge d'activació... Mantingueu el pols.
            </p>
            <button onclick="closeARCamera(false)" class="absolute top-6 right-6 w-14 h-14 bg-white/20 backdrop-blur text-white rounded-full flex items-center justify-center"><i class="ph-bold ph-x text-2xl"></i></button>
        </div>
        <div id="ar-content-overlay" class="absolute inset-0 hidden bg-black/40 backdrop-blur-sm z-20"></div>
    </div>

    <script>
        // Substituïu aquesta URL per la del vostre Google Apps Script que actua de catàleg
        const GLOBAL_CATALOG_URL = "https://script.google.com/macros/s/AKfycbw7_V0bW_fqNXoFf9hPpwBDKEXZMT735ulmCVp9HegUZ69W5_7FvgjQ8FtJG3g6izc/exec";

        // Transparent 1x1 pixel base64 for default placeholder
        const defaultB64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

        function getEmbedUrl(u) { if (!u) return ''; if (u.includes('youtube.com/watch?v=')) return `https://www.youtube.com/embed/${new URL(u).searchParams.get('v')}`; if (u.includes('youtu.be/')) return `https://www.youtube.com/embed/${u.split('youtu.be/')[1]}`; return u; }

        function renderMedia(step) {
            if (!step.mediaType || step.mediaType === 'none' || !step.mediaUrl) return '';
            
            const isDark = step.type === 'stage';
            const borderColor = isDark ? 'border-slate-600' : 'border-slate-200';
            const bgColor = isDark ? 'bg-slate-700' : 'bg-slate-50';
            const textColor = isDark ? 'text-emerald-400' : 'text-slate-500';

            if (step.mediaType === 'image') {
                return `<img src="${step.mediaUrl}" class="w-full h-auto max-h-64 object-cover rounded-xl mb-6 shadow-sm border ${borderColor}" onerror="this.style.display='none'">`;
            } else if (step.mediaType === 'video') {
                const embedUrl = getEmbedUrl(step.mediaUrl);
                if (embedUrl.includes('youtube') || embedUrl.includes('vimeo')) {
                    return `<div class="video-container mb-6 shadow-sm border ${borderColor} rounded-xl overflow-hidden"><iframe src="${embedUrl}" frameborder="0" allowfullscreen></iframe></div>`;
                } else {
                    return `<video src="${step.mediaUrl}" controls class="w-full max-h-64 rounded-xl mb-6 bg-black shadow-sm border ${borderColor}"></video>`;
                }
            } else if (step.mediaType === 'audio') {
                return `
                    <div class="${bgColor} border ${borderColor} p-4 rounded-xl mb-6 flex flex-col items-center gap-3 w-full shadow-sm">
                        <i class="ph-duotone ph-headphones text-4xl ${textColor}"></i>
                        <audio src="${step.mediaUrl}" controls class="w-full outline-none"></audio>
                    </div>
                `;
            } else if (step.mediaType === '3d') {
                return `
                    <div class="mb-6 relative group w-full shadow-sm">
                        <model-viewer src="${step.mediaUrl}" auto-rotate camera-controls shadow-intensity="1" class="w-full h-64 ${bgColor} rounded-xl border ${borderColor}"></model-viewer>
                        <div class="absolute top-2 right-2 bg-slate-900/60 text-white text-xs px-2 py-1 rounded backdrop-blur-sm flex items-center gap-1">
                            <i class="ph ph-hand-swipe-left"></i> Interactiu
                        </div>
                    </div>
                `;
            }
            return '';
        }

        window.draggedSortIndex = null;
        window.dragSortStart = function(e, idx) { window.draggedSortIndex = idx; e.dataTransfer.effectAllowed = 'move'; };
        window.dragSortOver = function(e) { e.preventDefault(); };
        window.dragSortDrop = function(e, targetIdx) {
            e.preventDefault();
            if (window.draggedSortIndex === null || window.draggedSortIndex === targetIdx) return;
            const arr = state.view === 'create' ? state.previewSortOrder : state.playState.currentSortOrder;
            const item = arr.splice(window.draggedSortIndex, 1)[0];
            arr.splice(targetIdx, 0, item);
            window.draggedSortIndex = null;
            renderAll();
        };

        const state = {
            view: 'home', 
            previewStepIndex: 0,
            tours: [],
            draftTour: { id: null, title: '', description: '', steps: [], trackingUrl: '', accessType: 'free' },
            playState: { tourId: null, currentStep: 0, score: 0, maxScore: 0, attempts: {}, feedbackMsg: null, feedbackType: null, geoVerified: false, stepStartTime: null, interactionLogs: [], currentSortOrder: null },
            modalState: { isOpen: false, type: null, editIndex: null, tempQuizOptions: [], tempQuizCorrect: 0 },
            dialogState: { isOpen: false, message: '', type: 'alert', onConfirm: null, placeholder: '' }
        };

        function loadToursFromCatalog() {
            if (!GLOBAL_CATALOG_URL || window.isAutonomous) return;
            
            fetch(GLOBAL_CATALOG_URL + "?action=getCatalog")
                .then(res => res.json())
                .then(data => {
                    if (data.urls && data.urls.length > 0) {
                        let carregades = 0;
                        data.urls.forEach(url => {
                            fetch(url)
                                .then(r => r.json())
                                .then(tourData => {
                                    const toursToImport = Array.isArray(tourData) ? tourData : [tourData];
                                    toursToImport.forEach(impTour => {
                                        if(impTour.id && impTour.title && Array.isArray(impTour.steps)) {
                                            const idx = state.tours.findIndex(t => t.id === impTour.id);
                                            if (idx >= 0) state.tours[idx] = impTour;
                                            else state.tours.push(impTour);
                                            carregades++;
                                        }
                                    });
                                    if(carregades > 0) renderView();
                                })
                                .catch(e => console.warn("No s'ha pogut carregar la ruta des de la URL: " + url));
                        });
                    }
                })
                .catch(e => console.warn("Error en connectar amb el catàleg de rutes de Google Sheets."));
        }

        window.importFolder = function(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            
            let loadedCount = 0;
            let processedFiles = 0;
            const totalFiles = files.length;
            
            Array.from(files).forEach(file => {
                if (file.name.toLowerCase().startsWith('rutaviva_') && file.name.toLowerCase().endsWith('.json')) {
                    const reader = new FileReader();
                    reader.onload = ev => {
                        try {
                            const imported = JSON.parse(ev.target.result);
                            if (Array.isArray(imported)) {
                                imported.forEach(impTour => {
                                    if(impTour.id && impTour.title && Array.isArray(impTour.steps)) {
                                        const idx = state.tours.findIndex(t => t.id === impTour.id);
                                        if (idx >= 0) state.tours[idx] = impTour;
                                        else state.tours.push(impTour);
                                        loadedCount++;
                                    }
                                });
                            }
                        } catch(err) {
                            console.error("Error processant l'arxiu: " + file.name, err);
                        }
                        checkComplete();
                    };
                    reader.readAsText(file);
                } else {
                    checkComplete();
                }
                
                function checkComplete() {
                    processedFiles++;
                    if (processedFiles === totalFiles) {
                        showDialog(`S'ha completat la cerca a la carpeta. S'han carregat ${loadedCount} ruta/es correctament.`);
                        renderView();
                    }
                }
            });
            e.target.value = '';
        };

        let mapInstance = null;
        let mapMarker = null;
        let mapCircle = null;
        let currentVideoStream = null; 
        let arScanActive = false;

        window.onload = () => {
            renderAll();
            loadToursFromCatalog();
        };

        function renderAll() { renderView(); renderModal(); renderDialogUI(); }

        function renderView() {
            const appContainer = document.getElementById('app');
            appContainer.innerHTML = `
                <header class="bg-emerald-600 text-white shadow-md sticky top-0 z-10">
                    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                        <div class="flex items-center gap-2 cursor-pointer" onclick="navigateTo('home')">
                            <i class="ph-fill ph-map-trifold text-3xl"></i>
                            <h1 class="text-xl font-bold tracking-wide">RutaViva</h1>
                        </div>
                        <nav>
                            <button onclick="navigateTo('home')" class="p-2 hover:bg-emerald-700 rounded-full transition" title="Inici">
                                <i class="ph ph-house text-2xl"></i>
                            </button>
                        </nav>
                    </div>
                </header>
            `;

            const mainContent = document.createElement('main');
            mainContent.className = 'flex-grow max-w-6xl w-full mx-auto p-4 flex flex-col fade-in relative z-0';
            
            switch(state.view) {
                case 'home': mainContent.innerHTML = renderHome(); break;
                case 'create': mainContent.innerHTML = renderCreate(); break;
                case 'list': mainContent.innerHTML = renderList(); break;
                case 'play': mainContent.innerHTML = renderPlay(); break;
                case 'summary': mainContent.innerHTML = renderSummary(); break;
                default: mainContent.innerHTML = renderHome();
            }
            
            appContainer.appendChild(mainContent);

            if (state.view === 'play') {
                const tour = state.tours.find(t => t.id === state.playState.tourId);
                const step = tour.steps[state.playState.currentStep];
                if (step && (step.hasGeo || step.type === 'find_spot') && !state.playState.geoVerified && !state.playState.feedbackMsg) {
                    setTimeout(() => initMapForPlay(step.targetLat, step.targetLng, step.targetRadius || 30), 200);
                }
            }
        }

        function renderModal() {
            const container = document.getElementById('modal-container');
            if (state.view === 'create' && state.modalState.isOpen) {
                container.innerHTML = renderDynamicModal();
                const geoPanelEl = document.getElementById('geoControlPanel');
                if (state.modalState.type === 'find_spot' || (geoPanelEl && geoPanelEl.style.display !== 'none')) {
                    setTimeout(initMapForCreation, 200);
                }
            } else { container.innerHTML = ''; }
        }

        function renderDialogUI() {
            const container = document.getElementById('dialog-container');
            if (state.dialogState.isOpen) {
                const isConfirm = state.dialogState.type === 'confirm';
                const isPrompt = state.dialogState.type === 'prompt';
                const showCancel = isConfirm || isPrompt;
                
                container.innerHTML = `
                    <div class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center p-4 z-[200]">
                        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center">
                            <div class="w-20 h-20 ${showCancel ? 'bg-orange-100 text-orange-500' : 'bg-blue-100 text-blue-500'} rounded-full flex items-center justify-center mx-auto mb-6">
                                <i class="ph-fill ${isConfirm ? 'ph-warning-circle' : (isPrompt ? 'ph-lock-key' : 'ph-info')} text-4xl"></i>
                            </div>
                            <p class="text-xl font-bold text-slate-800 mb-6">${state.dialogState.message}</p>
                            ${isPrompt ? `<input type="text" id="dialogPromptInput" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-xl mb-6 text-center text-lg tracking-widest font-mono focus:border-emerald-500 focus:outline-none" placeholder="${state.dialogState.placeholder || ''}">` : ''}
                            <div class="flex gap-3 justify-center" id="dialogButtonsContainer">
                                ${showCancel ? `<button onclick="closeDialog(false)" class="px-5 py-3 text-slate-600 font-semibold hover:bg-slate-100 rounded-xl transition">Cancel·lar</button>` : ''}
                                <button onclick="closeDialog(true)" class="px-6 py-3 ${showCancel ? 'bg-orange-500 hover:bg-orange-600' : 'bg-blue-500 hover:bg-blue-600'} text-white rounded-xl font-bold transition">${isPrompt ? 'Validar' : 'D\'acord'}</button>
                            </div>
                        </div>
                    </div>
                `;
            } else { container.innerHTML = ''; }
        }

        function showDialog(message, type = 'alert', onConfirm = null, placeholder = '') { state.dialogState = { isOpen: true, message, type, onConfirm, placeholder }; renderDialogUI(); }
        
        function closeDialog(confirmed) { 
            const onConfirm = state.dialogState.onConfirm; 
            const val = document.getElementById('dialogPromptInput') ? document.getElementById('dialogPromptInput').value.trim() : null;
            state.dialogState.isOpen = false; 
            renderDialogUI(); 
            if (confirmed && onConfirm) onConfirm(val); 
        }

        function renderHome() {
            let htmlList = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto w-full mb-8">`;
            const visibleTours = state.tours.filter(t => !t.id.startsWith('temp-'));
            if (visibleTours.length === 0) {
                htmlList += `<div class="col-span-1 md:col-span-2 text-center py-10 bg-white rounded-2xl shadow-sm border border-slate-200 text-slate-500">No hi ha cap ruta guardada actualment a la memòria. Carregueu una carpeta o creeu-ne una de nova.</div>`;
            } else {
                visibleTours.forEach(tour => {
                    htmlList += `
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full text-left">
                            <h3 class="text-xl font-bold mb-2">${tour.title}</h3>
                            <p class="text-sm text-slate-500 mb-4 flex-grow line-clamp-2">${tour.description || 'Sense descripció.'}</p>
                            <div class="flex gap-2 mt-4">
                                ${window.isAutonomous ? '' : `<button onclick="editTour('${tour.id}')" class="p-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg transition" title="Editar"><i class="ph-bold ph-pencil-simple"></i></button>`}
                                <button onclick="checkTourAccess('${tour.id}')" class="flex-grow py-3 bg-slate-900 hover:bg-slate-800 text-white rounded-lg font-bold transition">Iniciar Experiència</button>
                            </div>
                        </div>
                    `;
                });
            }
            htmlList += `</div>`;

            let creatorButtons = '';
            if (!window.isAutonomous) {
                creatorButtons = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl mt-auto pt-8 border-t border-slate-200">
                        <button onclick="startCreation()" class="flex flex-col items-center justify-center p-6 bg-white rounded-2xl shadow-sm border border-slate-200 hover:shadow-md hover:border-blue-300 hover:bg-blue-50 transition group">
                            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mb-3 mx-auto group-hover:scale-110 transition"><i class="ph-fill ph-plus text-2xl text-blue-600"></i></div>
                            <h3 class="text-lg font-bold text-slate-800">Crear Ruta Nova</h3>
                        </button>

                        <div class="flex flex-col items-center justify-center p-6 bg-white rounded-2xl shadow-sm border border-slate-200 hover:shadow-md hover:border-emerald-300 hover:bg-emerald-50 transition group relative overflow-hidden">
                            <input type="file" id="importSingleFileInputHome" accept=".json" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="importTours(event)">
                            <div class="w-12 h-12 bg-emerald-100 rounded-full flex items-center justify-center mb-3 mx-auto group-hover:scale-110 transition"><i class="ph-fill ph-file-json text-2xl text-emerald-600"></i></div>
                            <h3 class="text-lg font-bold text-slate-800">Carregar un Projecte</h3>
                            <p class="text-xs text-slate-500 mt-1">Importa un únic fitxer JSON</p>
                        </div>

                        <div class="flex flex-col items-center justify-center p-6 bg-white rounded-2xl shadow-sm border border-slate-200 hover:shadow-md hover:border-teal-300 hover:bg-teal-50 transition group relative overflow-hidden">
                            <input type="file" id="importFolderInput" webkitdirectory directory multiple class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="window.importFolder(event)">
                            <div class="w-12 h-12 bg-teal-100 rounded-full flex items-center justify-center mb-3 mx-auto group-hover:scale-110 transition"><i class="ph-fill ph-folder-open text-2xl text-teal-600"></i></div>
                            <h3 class="text-lg font-bold text-slate-800">Carregar Carpeta</h3>
                            <p class="text-xs text-slate-500 mt-1">S'importaran tots els JSON rutaviva_</p>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="flex flex-col items-center justify-start flex-grow text-center py-8 w-full max-w-4xl mx-auto">
                    <i class="ph-duotone ph-compass text-6xl text-emerald-500 mb-4"></i>
                    <h2 class="text-3xl font-extrabold text-slate-800 mb-8">Rutes Disponibles</h2>
                    
                    ${htmlList}
                    ${creatorButtons}
                </div>
            `;
        }

        function renderList() {
            return renderHome();
        }

        function renderStepPreviewSimulator() {
            if (state.draftTour.steps.length === 0) return '<div class="p-8 text-center text-slate-400 mt-20">Seleccioneu una etapa per previsualitzar-la aquí</div>';
            
            const step = state.draftTour.steps[state.previewStepIndex];
            if (!step) return '';

            let mediaHtml = renderMedia(step);
            let contentHtml = '';
            
            if (step.type === 'stage') {
                contentHtml = `<div class="bg-slate-800 text-white p-6 rounded-2xl text-center border-4 border-slate-700 mb-4">${mediaHtml}<h2 class="text-2xl font-black uppercase">${step.title}</h2></div><button onclick="showDialog('Iniciaria l\\'etapa oficialment.')" class="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold">Començar etapa</button>`;
            } else if (step.type === 'info') {
                contentHtml = `<div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-4">${mediaHtml}<p class="text-slate-700 text-sm">${step.content}</p></div><button onclick="showDialog('Passaria a la següent activitat.')" class="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold">Següent</button>`;
            } else if (step.type === 'quiz') {
                contentHtml = `<div class="bg-white p-5 rounded-2xl border border-slate-200 mb-4"><h3 class="font-bold text-sm mb-3">${step.question}</h3>${mediaHtml}<div class="space-y-2">${step.options.map(o=>`<button onclick="showDialog('S\\'ha seleccionat l\\'opció: ${o}')" class="w-full p-3 border-2 rounded-xl text-slate-700 text-sm font-medium text-left">${o}</button>`).join('')}</div></div>`;
            } else if (step.type === 'question') {
                contentHtml = `<div class="bg-white p-5 rounded-2xl border border-slate-200 mb-4"><h3 class="font-bold text-sm mb-3">${step.question}</h3>${mediaHtml}<input type="text" class="w-full p-3 bg-slate-50 border-2 rounded-xl mb-4 text-sm" placeholder="Escriu aquí..."><button onclick="showDialog('Comprovaria si el text introduït coincideix amb alguna de les respostes vàlides.')" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold">Enviar</button></div>`;
            } else if (step.type === 'mission') {
                contentHtml = `<div class="bg-white p-5 rounded-2xl border border-slate-200 mb-4"><h2 class="font-bold text-sm mb-2">Missió</h2><p class="mb-4 text-xs">${step.instruction}</p>${mediaHtml}<textarea class="w-full p-3 bg-slate-50 border-2 rounded-xl mb-4" rows="2"></textarea><button onclick="showDialog('Es registraria la resposta de la missió com a completada.')" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold">Completar</button></div>`;
            } else if (step.type === 'sort') {
                if (!state.previewSortOrder || state.previewSortOrder.__id !== state.previewStepIndex) {
                    let arr = [...step.correctOrder];
                    for(let i = arr.length - 1; i > 0; i--){
                        const j = Math.floor(Math.random() * (i + 1));
                        [arr[i], arr[j]] = [arr[j], arr[i]];
                    }
                    if (arr.join() === step.correctOrder.join() && arr.length > 1) {
                        [arr[0], arr[1]] = [arr[1], arr[0]];
                    }
                    state.previewSortOrder = arr;
                    state.previewSortOrder.__id = state.previewStepIndex;
                }

        function setPreviewStep(idx, e) {
            if (e && (e.target.closest('button') || e.target.tagName.toLowerCase() === 'button')) return;
            
            // Guardem l'estat actual de l'scroll tant de la finestra com de la llista
            const listContainer = document.querySelector('.overflow-y-auto.pr-2.no-scrollbar');
            const scrollPos = listContainer ? listContainer.scrollTop : 0;
            const windowScroll = window.scrollY;

            state.previewStepIndex = idx;
            renderView();
            
            // Restaurem l'scroll immediatament després de renderitzar
            const newListContainer = document.querySelector('.overflow-y-auto.pr-2.no-scrollbar');
            if (newListContainer) newListContainer.scrollTop = scrollPos;
            window.scrollTo(0, windowScroll);
        }

        function handleTriggerUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > 600) { h = Math.round(h * 600 / w); w = 600; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    document.getElementById('modalInputTriggerB64').value = canvas.toDataURL('image/jpeg', 0.8);
                    
                    const tCanvas = document.createElement('canvas');
                    tCanvas.width = 64; tCanvas.height = 64;
                    tCanvas.getContext('2d').drawImage(img, 0, 0, 64, 64);
                    document.getElementById('modalInputTriggerTemplate').value = tCanvas.toDataURL('image/jpeg', 0.8);
                    
                    const preview = document.getElementById('triggerPreview');
                    preview.src = canvas.toDataURL('image/jpeg', 0.8);
                    preview.style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function initMapForCreation() {
            const container = document.getElementById('creatorMap');
            if (!container) return;
            const lat = parseFloat(document.getElementById('modalInputLat').value) || 41.3851;
            const lng = parseFloat(document.getElementById('modalInputLng').value) || 2.1734;
            const radius = parseInt(document.getElementById('modalRadius').value) || 30;

            mapInstance = L.map('creatorMap').setView([lat, lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
            
            mapMarker = L.marker([lat, lng]).addTo(mapInstance);
            mapCircle = L.circle([lat, lng], { radius: radius, color: '#3b82f6', fillOpacity: 0.2 }).addTo(mapInstance);

            mapInstance.on('click', e => {
                mapMarker.setLatLng(e.latlng);
                mapCircle.setLatLng(e.latlng);
                document.getElementById('modalInputLat').value = e.latlng.lat;
                document.getElementById('modalInputLng').value = e.latlng.lng;
            });
            setTimeout(() => mapInstance.invalidateSize(), 200);
        }

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);

        function verifyGeoPosition() {
            const btn = document.getElementById('verifyBtn');
            btn.innerHTML = `<i class="ph ph-spinner animate-spin"></i> Verificant...`;
            btn.disabled = true;

            const tour = state.tours.find(t => t.id === state.playState.tourId);
            const step = tour.steps[state.playState.currentStep];

            if (!navigator.geolocation) {
                showDialog("La geolocalització no és compatible amb aquest dispositiu.");
                btn.innerHTML = `<i class="ph-bold ph-crosshair"></i> Validar Ubicació`;
                btn.disabled = false;
                return;
            }

            navigator.geolocation.getCurrentPosition(pos => {
                const dist = getDistanceFromLatLonInM(pos.coords.latitude, pos.coords.longitude, step.targetLat, step.targetLng);
                const radius = step.targetRadius || 30;
                if (dist <= radius) {
                    state.playState.geoVerified = true;
                    renderView();
                } else {
                    const remaining = Math.round(dist - radius);
                    showDialog(`Encara sou lluny. Us falten uns ${remaining > 0 ? remaining : Math.round(dist)} metres per arribar a la zona de validació.`);
                    btn.innerHTML = `<i class="ph-bold ph-crosshair"></i> Validar Ubicació`;
                    btn.disabled = false;
                }
            }, err => {
                showDialog("No s'ha pogut obtenir la vostra ubicació. Reviseu els permisos.");
                btn.innerHTML = `<i class="ph-bold ph-crosshair"></i> Validar Ubicació`;
                btn.disabled = false;
            }, { enableHighAccuracy: true });
        }

        function getDistanceFromLatLonInM(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function openModal(type, editIndex = null) {
            state.modalState = { isOpen: true, type, editIndex, tempQuizOptions: [] };
            if (type === 'quiz' || type === 'survey' || type === 'sort') {
                const editData = editIndex !== null ? state.draftTour.steps[editIndex] : {};
                state.modalState.tempQuizOptions = editData.options || editData.correctOrder || ['', ''];
                state.modalState.tempQuizCorrect = editData.correct !== undefined ? editData.correct : 0;
            }
            renderModal();
            setTimeout(() => { if (document.getElementById('modalTourTitle')) document.getElementById('modalTourTitle').focus(); else if (document.getElementById('modalInput1')) document.getElementById('modalInput1').focus(); }, 100);
        }

        function saveStepFromModal() {
            const type = state.modalState.type;
            const editIndex = state.modalState.editIndex;
            let stepData = { 
                type, 
                mediaType: document.getElementById('modalMediaSelect')?.value || 'none',
                mediaUrl: document.getElementById('modalMediaUrl')?.value.trim() || '',
                hasGeo: document.getElementById('modalHasGeo')?.checked || (type === 'find_spot'),
                targetLat: parseFloat(document.getElementById('modalInputLat')?.value),
                targetLng: parseFloat(document.getElementById('modalInputLng')?.value),

            };

            const v1 = document.getElementById('modalInput1')?.value.trim();
            if (type === 'stage') stepData.title = v1;
            else if (type === 'info') stepData.content = v1;
            else if (type === 'quiz') {
                stepData.question = v1;
                stepData.options = state.modalState.tempQuizOptions.map((o,i)=>document.getElementById('opt'+i).value.trim());
                stepData.correct = parseInt(document.querySelector('input[name="correctOpt"]:checked')?.value || 0);
                stepData.scoreFirstTry = parseInt(document.getElementById('modalScore1').value);
                stepData.scoreNextTries = parseInt(document.getElementById('modalScore2').value);
            } else if (type === 'question') {
                stepData.question = v1;
                stepData.validAnswers = document.getElementById('modalInput2').value.split('\n').map(a=>a.trim().toLowerCase());
            } else if (type === 'sort') {
                stepData.instruction = v1;
                stepData.correctOrder = state.modalState.tempQuizOptions.map((o,i)=>document.getElementById('opt'+i).value.trim());
                stepData.scoreFirstTry = parseInt(document.getElementById('modalScore1').value);
                stepData.scoreNextTries = parseInt(document.getElementById('modalScore2').value);
            } else if (type === 'find_spot') {
                stepData.locationHint = v1;
            } else if (type === 'mission') {
                stepData.instruction = v1;
            } else if (type === 'scan_code') {
                stepData.instruction = v1;
                stepData.code = document.getElementById('modalInput2')?.value.trim() || '';
            } else if (type === 'ar_exp') {
                const arType = document.getElementById('modalInputArType').value;
                const arUrl = document.getElementById('modalInputArUrl').value.trim();
                const arText = document.getElementById('modalInputArText').value.trim();

                const triggerTemplateB64 = document.getElementById('modalInputTriggerTemplate').value;

                if(!v1) return showDialog("Falta escriure la instrucció de l'experiència de Realitat Augmentada.");
                if(!triggerImageB64 && editIndex === null) return showDialog("Heu d'afegir una Imatge d'Activació (Trigger) pujant un fitxer.");
                if(arType !== 'text' && !arUrl) return showDialog("Falta afegir la URL del recurs multimèdia escollit.");
                if(arType === 'text' && !arText) return showDialog("Falta escriure el text del missatge ocult flotant.");

                stepData.instruction = v1;
                stepData.triggerImageB64 = triggerImageB64;
                stepData.triggerTemplateB64 = triggerTemplateB64;
                stepData.arType = arType;
                stepData.arContent = arType === 'text' ? arText : arUrl;
            } else if (type === 'survey') {
                stepData.question = v1;
                stepData.options = state.modalState.tempQuizOptions.map((o,i)=>document.getElementById('opt'+i)?.value.trim() || '');
            }

            if (editIndex !== null) {
                if (type === 'ar_exp' && !stepData.triggerImageB64) {
                    stepData.triggerImageB64 = state.draftTour.steps[editIndex].triggerImageB64;
                    stepData.triggerTemplateB64 = state.draftTour.steps[editIndex].triggerTemplateB64;
                }
                state.draftTour.steps[editIndex] = stepData;
            }
            else state.draftTour.steps.push(stepData);
            
            closeModal();
            renderView();

        function moveSortItem(i, d) { const arr = state.playState.currentSortOrder; const j = i + d; if (j>=0 && j<arr.length) { [arr[i], arr[j]] = [arr[j], arr[i]]; renderView(); } }

        function finalizeSaveTour(downloadAsJson = false, keepEditing = false) {
            const titleEl = document.getElementById('modalTourTitle');
            const descEl = document.getElementById('modalTourDesc');
            const trackEl = document.getElementById('modalTourTracking');
            const accessEl = document.getElementById('modalTourAccess');
            
            if (titleEl) state.draftTour.title = titleEl.value.trim();
            if (descEl) state.draftTour.description = descEl.value.trim();
            if (trackEl) state.draftTour.trackingUrl = trackEl.value.trim();
            if (accessEl) state.draftTour.accessType = accessEl.value;
            
            if (!state.draftTour.title) {
                return showDialog("Cal afegir un títol a la ruta abans de desar-la.");
            }
            if (state.draftTour.steps.length === 0) {
                return showDialog("Cal afegir almenys un contingut o etapa a la ruta.");
            }
            if (state.draftTour.accessType === 'restricted' && !state.draftTour.trackingUrl) {
                return showDialog("Heu marcat la ruta com a restringida. Heu d'afegir la URL de Google Sheets perquè es puguin validar els codis d'accés correctament.");
            }
            
            let savedTour;
            if (state.draftTour.id && !state.draftTour.id.startsWith('temp-')) {
                const index = state.tours.findIndex(t => t.id === state.draftTour.id);
                if (index !== -1) {
                    state.tours[index] = { ...state.draftTour };
                    savedTour = state.tours[index];

                    savedTour = { ...state.draftTour };
                    state.tours.push(savedTour);
                }

        // --- SISTEMA DE SEGUIMENT I RESPOSTES ---
        function logInteraction(action, answer, score) {
            const tour = state.tours.find(t => t.id === state.playState.tourId);
            if (!tour || !tour.trackingUrl) return;
            
            const step = tour.steps[state.playState.currentStep];
            const elapsed = Date.now() - (state.playState.stepStartTime || Date.now());
            
            state.playState.interactionLogs.push({
                pas: state.playState.currentStep + 1,
                tipus_activitat: step.type,
                accio: action,
                resposta: answer || '',
                puntuacio: score || 0,
                temps_segons: Math.round(elapsed / 1000),
                data_hora: new Date().toISOString()
            });
        }
        
        function sendFinalLogs() {
            const tour = state.tours.find(t => t.id === state.playState.tourId);
            if (!tour || !tour.trackingUrl || state.playState.interactionLogs.length === 0) return;
            
            const payload = {
                ruta: tour.title,
                puntuacio_total: state.playState.score,
                max_puntuacio: state.playState.maxScore,
                finalitzat: new Date().toISOString(),
                detalls: state.playState.interactionLogs
            };
            
            fetch(tour.trackingUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(e => console.log('Notes: Tracking no enviat', e));
        }

        function checkTourAccess(id) {
            const tour = state.tours.find(t=>t.id===id);
            if (tour.accessType === 'restricted') {
                if (!tour.trackingUrl) {
                    return showDialog("Aquesta ruta està restringida però no té cap servidor configurat per validar l'accés. Modifiqueu l'experiència per incloure la URL.", "alert");
                }
                
                showDialog("Aquesta experiència és privada. Introdueix el codi per començar:", "prompt", (code) => {
                    if (!code) return;
                    
                    const btnContainer = document.getElementById('dialogButtonsContainer');
                    if(btnContainer) btnContainer.innerHTML = `<div class="px-6 py-3 bg-slate-200 text-slate-600 rounded-xl font-bold flex items-center gap-2"><i class="ph ph-spinner animate-spin text-xl"></i> Validant...</div>`;

                    fetch(tour.trackingUrl + '?action=verify&code=' + encodeURIComponent(code))
                        .then(res => res.json())
                        .then(data => {
                            if (data.valid) {
                                state.dialogState.isOpen = false;
                                renderDialogUI();
                                startTour(id);
                            } else {
                                showDialog("El codi introduït no existeix o no és vàlid.", "alert");
                            }
                        })
                        .catch(err => {
                            showDialog("S'ha produït un error connectant amb el servidor en validar el codi. Comproveu la connexió a internet o la configuració de la URL.", "alert");
                        });
                }, "Codi (ex: 45A9)");
            } else {
                startTour(id);
            }
        }

        function startTour(id, startStepIndex = 0) {
            const tour = state.tours.find(t=>t.id===id);
            
            const initPlay = () => {
                const maxScore = tour.steps.reduce((acc, step) => {
                    if (step.type === 'quiz' || step.type === 'question' || step.type === 'sort') return acc + (step.scoreFirstTry !== undefined ? step.scoreFirstTry : 10);
                    return acc;
                }, 0);
                state.playState = { tourId: id, currentStep: startStepIndex, score: 0, attempts: {}, feedbackMsg: null, geoVerified: false, maxScore: maxScore, stepStartTime: Date.now(), interactionLogs: [], currentSortOrder: null };
                navigateTo('play');
            };

            // Demanar permisos de càmera a l'inici independentment de si hi ha AR
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                    .then(stream => {
                        stream.getTracks().forEach(track => track.stop());
                        initPlay();
                    })
                    .catch(err => {
                        showDialog("L'aplicació requereix accés a la càmera per a algunes funcions. Assegureu-vos de donar els permisos o d'obrir el fitxer en un entorn compatible. Es podrà continuar l'experiència visualitzant el contingut igualment.", "alert", () => {
                            initPlay();
                        });
                    });
            } else {
                initPlay();
            }
        }

        function previewFromStep(i) {
            if (!state.draftTour.title) state.draftTour.title = "Previsualització";
            const id = 'temp-preview';
            const existing = state.tours.findIndex(t=>t.id===id);
            if (existing!==-1) state.tours[existing] = { ...state.draftTour, id };
            else state.tours.push({ ...state.draftTour, id });
            startTour(id, i);
        }

        function answerQuiz(i) {
            const step = state.tours.find(t=>t.id===state.playState.tourId).steps[state.playState.currentStep];
            if (!state.playState.attempts) state.playState.attempts = {};
            const stepIndex = state.playState.currentStep;
            if (state.playState.attempts[stepIndex] === undefined) state.playState.attempts[stepIndex] = 0;
            
            const isFirstTry = state.playState.attempts[stepIndex] === 0;
            state.playState.attempts[stepIndex]++;

            if (i === step.correct) { 
                const scoreToAdd = isFirstTry ? (step.scoreFirstTry !== undefined ? step.scoreFirstTry : 10) : (step.scoreNextTries !== undefined ? step.scoreNextTries : 5);
                state.playState.score += scoreToAdd;
                state.playState.feedbackMsg = step.successMsg || "Correcte!"; 
                state.playState.feedbackType = 'success'; 
            } else { 
                state.playState.feedbackMsg = step.errorMsg || "Incorrecte."; 
                state.playState.feedbackType = 'error'; 
            }
            logInteraction('Respon Test', step.options[i], state.playState.score);
            renderView();
        }

        function verifyText(type) {
            const input = document.getElementById('playInput').value.trim().toLowerCase();
            const step = state.tours.find(t=>t.id===state.playState.tourId).steps[state.playState.currentStep];
            
            if (!state.playState.attempts) state.playState.attempts = {};
            const stepIndex = state.playState.currentStep;
            if (state.playState.attempts[stepIndex] === undefined) state.playState.attempts[stepIndex] = 0;
            const isFirstTry = state.playState.attempts[stepIndex] === 0;
            state.playState.attempts[stepIndex]++;

            if (type === 'question') {
                if (step.validAnswers.includes(input)) { 
                    const scoreToAdd = isFirstTry ? (step.scoreFirstTry !== undefined ? step.scoreFirstTry : 10) : (step.scoreNextTries !== undefined ? step.scoreNextTries : 5);
                    state.playState.score += scoreToAdd;
                    state.playState.feedbackMsg = step.successMsg || "Molt bé!"; 
                    state.playState.feedbackType = 'success'; 
                } else { 
                    state.playState.feedbackMsg = step.errorMsg || "No és correcte."; 
                    state.playState.feedbackType = 'error'; 
                }
            } else if (type === 'scan_code') {
                if (input === step.code.toLowerCase()) {
                    state.playState.feedbackMsg = "Codi validat correctament!";
                    state.playState.feedbackType = 'success';
                } else {
                    state.playState.feedbackMsg = "Codi invàlid. Torneu a comprovar-ho.";
                    state.playState.feedbackType = 'error';
                }
            } else { 
                state.playState.score += 5; 
                state.playState.feedbackMsg = "Missió completada."; 
                state.playState.feedbackType = 'success'; 
            }
            logInteraction(type === 'question' ? 'Respon Obertament' : 'Introdueix Codi/Missió', input, state.playState.score);
            renderView();
        }

        function verifySort() {
            const step = state.tours.find(t=>t.id===state.playState.tourId).steps[state.playState.currentStep];
            const currentOrder = state.playState.currentSortOrder;
            const isCorrect = step.correctOrder.every((item, i) => item === currentOrder[i]);
            
            if (!state.playState.attempts) state.playState.attempts = {};
            const stepIndex = state.playState.currentStep;
            if (state.playState.attempts[stepIndex] === undefined) state.playState.attempts[stepIndex] = 0;
            const isFirstTry = state.playState.attempts[stepIndex] === 0;
            state.playState.attempts[stepIndex]++;

            if (isCorrect) {
                const scoreToAdd = isFirstTry ? (step.scoreFirstTry !== undefined ? step.scoreFirstTry : 10) : (step.scoreNextTries !== undefined ? step.scoreNextTries : 5);
                state.playState.score += scoreToAdd;
                state.playState.feedbackMsg = "Ordre correcte! Molt bé.";
                state.playState.feedbackType = 'success';
            } else {
                state.playState.feedbackMsg = "L'ordre no és correcte. Torneu-ho a provar.";
                state.playState.feedbackType = 'error';
            }
            logInteraction('Respon Ordenar', currentOrder.join(', '), state.playState.score);
            renderView();
        }

        function nextStep() {
            state.playState.feedbackMsg = null;
            state.playState.geoVerified = false;
            state.playState.currentSortOrder = null;
            
            const tour = state.tours.find(t=>t.id===state.playState.tourId);

        // --- CÀMERA AR INTEGRADOR MINDAR ---
        function parseGoogleDriveUrl(url, type) {
            if (!url) return '';
            const driveRegex = /(?:https:\/\/)?(?:drive\.google\.com\/)(?:file\/d\/|open\?id=)([\w-]+)/;
            const match = url.match(driveRegex);
            if (match && match[1]) {
                const fileId = match[1];
                return `https://drive.google.com/uc?export=download&id=${fileId}`;
            }
            return url; 
        }

        function bufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            const len = bytes.byteLength;
            const chunkSize = 0x8000;
            for (let i = 0; i < len; i += chunkSize) {
                binary += String.fromCharCode.apply(null, bytes.subarray(i, Math.min(i + chunkSize, len)));
            }
            return window.btoa(binary);
        }

        function generateAFrameHTML(step, base64MindData) {
            const cType = step.arType;

            const cUrlSafe = parseGoogleDriveUrl(rawUrl, cType);
            
            let assetsHtml = '<a-assets timeout="10000">\n';

            const contentRotation = '0 0 0';
            const cScale = '1.0';
            
            if (cType === 'text') {
                const cText = rawUrl.replace(/"/g, '&quot;');

            } else if (cType === 'image') {
                entityHtml = `<a-entity dynamic-ar-image="src: ${cUrlSafe}" position="${contentPosition}" rotation="${contentRotation}"></a-entity>\n`;
            } else if (cType === 'video') {
                assetsHtml += `<video id="ar-media" src="${cUrlSafe}" crossorigin="anonymous" playsinline webkit-playsinline loop muted></video>\n`;
                requiresAssets = true;
                requiresMediaPlay = true;
                entityHtml = `<a-video src="#ar-media" position="${contentPosition}" rotation="${contentRotation}" scale="${cScale} ${cScale} ${cScale}" material="side: double" auto-ratio media-handler="target: #ar-media"></a-video>\n`;
            } else if (cType === 'audio') {
                assetsHtml += `<audio id="ar-media" src="${cUrlSafe}" preload="auto" loop></audio>\n`;
                requiresAssets = true;
                requiresMediaPlay = true;
                entityHtml = `<a-entity dynamic-text="text: 🔊; textColor: #ffffff; bgColor: #4f46e5; bgTransparent: false" position="${contentPosition}" rotation="${contentRotation}" scale="0.5 0.5 0.5" media-handler="target: #ar-media"></a-entity>\n`;
            } else if (cType === '3d') {
                entityHtml = `<a-entity gltf-model="${cUrlSafe}" position="${contentPosition}" rotation="${contentRotation}" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear" auto-scale-model="userScale: ${cScale}"></a-entity>\n`;
            }

            assetsHtml += '</a-assets>\n';
            
            if (!requiresAssets) assetsHtml = '';

            const safeAssets = assetsHtml.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, " ");
            const safeEntity = entityHtml.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, " ");

            const uiHtml = `<div id="ui-layer" style="position: absolute; top: 20px; width: 100%; text-align: center; color: white; z-index: 100; pointer-events: none; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); font-family: sans-serif;">
                <h2>Enfoqueu l'activador per interactuar</h2>
            </div>`;

            const sEnd = "<" + "/script>";

            return `<!DOCTYPE html>
            <html lang="ca">
            <head>
                <meta charset="utf-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>AR Experience</title>
                <script src="https://aframe.io/releases/1.4.2/aframe.min.js">${sEnd}
                <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js">${sEnd}
                <style>body { margin: 0; overflow: hidden; background: #000; }</style>
                <script>
                    
                    // COMPONENT AR-IMAGE-DISPLAY: Càrrega intel·ligent per saltar-se les restriccions del WebGL i ajustar l'aspecte perfectament.
                    AFRAME.registerComponent('dynamic-ar-image', {
                        schema: { src: {type: 'string'} },
                        init: function () {
                            this.el.setAttribute('visible', 'false');
                            this.loaded = false;
                            
                            const marker = this.el.closest('[mindar-image-target]');
                            if (marker) {
                                marker.addEventListener('targetFound', () => {
                                    if (!this.loaded) this.loadImage();
                                });
                            }
                        },
                        loadImage: async function() {
                            const url = this.data.src;
                            
                            const tryLoad = (u) => new Promise((resolve, reject) => {
                                const img = new Image();
                                img.crossOrigin = "anonymous";
                                img.onload = () => resolve(img);
                                img.onerror = () => reject(new Error('Failed to load'));
                                img.src = u;
                            });

                            const proxies = [
                                url,
                                'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
                                'https://corsproxy.io/?' + encodeURIComponent(url)
                            ];

                            let loadedImg = null;
                            
                            for (let i = 0; i < proxies.length; i++) {
                                try {
                                    loadedImg = await tryLoad(proxies[i]);
                                    break;
                                } catch (e) {
                                    console.warn("Fallada en la via de descàrrega " + i);
                                }
                            }

                            if (!loadedImg) {
                                console.error("Error: El servidor ha bloquejat la textura (CORS).");
                                this.el.setAttribute('geometry', 'primitive: plane; width: 1; height: 1');
                                this.el.setAttribute('material', 'color: #ef4444; transparent: true; opacity: 0.5; side: double');
                                this.el.setAttribute('visible', 'true');
                                return;
                            }

                            const ratio = loadedImg.height / loadedImg.width;
                            this.el.setAttribute('geometry', 'primitive: plane; width: 1; height: ' + ratio);

                            const texture = new THREE.Texture(loadedImg);
                            texture.needsUpdate = true;
                            if (THREE.SRGBColorSpace) texture.colorSpace = THREE.SRGBColorSpace;
                            else if (THREE.sRGBEncoding) texture.encoding = THREE.sRGBEncoding;
                            texture.minFilter = THREE.LinearFilter;

                            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
                            this.el.getObject3D('mesh').material = material;
                            
                            this.el.setAttribute('visible', 'true');
                            this.loaded = true;
                        }
                    });

                    AFRAME.registerComponent('auto-ratio', {
                        init: function () {
                            const el = this.el; let ratioApplied = false;
                            const applyRatio = (w, h) => { if (w && h && !ratioApplied) { const ratio = w / h; el.setAttribute('width', ratio); el.setAttribute('height', 1); ratioApplied = true; } };
                            
                            const srcId = el.getAttribute('src');
                            if (srcId && srcId.startsWith('#')) {
                                const assetEl = document.querySelector(srcId);
                                if (assetEl && assetEl.tagName.toLowerCase() === 'img') {
                                    if (assetEl.complete && assetEl.naturalWidth) applyRatio(assetEl.naturalWidth, assetEl.naturalHeight);
                                    else assetEl.addEventListener('load', () => applyRatio(assetEl.naturalWidth, assetEl.naturalHeight));
                                }
                            }

                            el.addEventListener('materialtextureloaded', () => {
                                const material = el.components.material && el.components.material.material;
                                if (material && material.map && material.map.image && !material.map.image.videoWidth) applyRatio(material.map.image.width, material.map.image.height);
                            });
                            
                            if (el.tagName.toLowerCase() === 'a-video') {
                                if (srcId && srcId.startsWith('#')) {
                                    const videoEl = document.querySelector(srcId);
                                    if (videoEl) {
                                        const checkAndApply = () => { if (videoEl.videoWidth > 0) applyRatio(videoEl.videoWidth, videoEl.videoHeight); };
                                        videoEl.addEventListener('loadedmetadata', checkAndApply); videoEl.addEventListener('playing', checkAndApply); videoEl.addEventListener('canplay', checkAndApply);
                                        const fallbackCheck = setInterval(() => { if (ratioApplied) clearInterval(fallbackCheck); else checkAndApply(); }, 500);
                                    }
                                }
                            }
                        }
                    });

                    AFRAME.registerComponent('auto-scale-model', {
                        schema: { userScale: {type: 'number', default: 1.0} },
                        init: function () {
                            let scaleApplied = false;
                            let retries = 0;
                            const applyScale = () => {
                                if (scaleApplied || retries > 20) return;
                                const model = this.el.getObject3D('mesh');
                                if (!model) { retries++; setTimeout(applyScale, 200); return; }
                                const clone = model.clone();
                                clone.position.set(0,0,0); clone.rotation.set(0,0,0); clone.scale.set(1,1,1); clone.updateMatrixWorld(true);
                                clone.traverse(node => { if (node.isMesh && node.geometry) node.geometry.computeBoundingBox(); });
                                const box = new THREE.Box3().setFromObject(clone);
                                const size = new THREE.Vector3(); box.getSize(size);
                                const center = new THREE.Vector3(); box.getCenter(center);
                                if (size.length() === 0) { retries++; setTimeout(applyScale, 200); return; }
                                const maxDim = Math.max(size.x, size.y, size.z);
                                if (maxDim > 0 && maxDim !== Infinity && !isNaN(maxDim)) {
                                    const targetScale = this.data.userScale / maxDim;
                                    this.el.setAttribute('scale', targetScale + ' ' + targetScale + ' ' + targetScale);
                                    model.position.set(-center.x, -center.y, -center.z + (size.z / 2) + 0.05);
                                    scaleApplied = true;
                                }
                            };
                            this.el.addEventListener('model-loaded', () => setTimeout(applyScale, 100));
                        }
                    });

                    AFRAME.registerComponent('dynamic-text', {
                        schema: { text: {type: 'string', default: ''}, textColor: {type: 'string', default: '#ffffff'}, bgColor: {type: 'string', default: '#000000'}, bgTransparent: {type: 'boolean', default: false} },
                        init: function () {
                            const canvas = document.createElement('canvas'); canvas.width = 1024; canvas.height = 1024; const ctx = canvas.getContext('2d');
                            if (!this.data.bgTransparent) { ctx.fillStyle = this.data.bgColor; ctx.globalAlpha = 0.85; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.globalAlpha = 1.0; }
                            ctx.fillStyle = this.data.textColor; const isIcon = this.data.text.trim() === '🔊';
                            ctx.font = isIcon ? 'bold 400px sans-serif' : 'bold 56px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                            if (isIcon) { ctx.fillText(this.data.text, canvas.width / 2, canvas.height / 2); } else {
                                const lines = [];
                                this.data.text.split(/\\\\n|\\n/).forEach(manualLine => {
                                    let currentLine = '';
                                    manualLine.split(' ').forEach(word => {
                                        let testLine = currentLine + word + ' ';
                                        if (ctx.measureText(testLine).width > 900 && currentLine !== '') { lines.push(currentLine); currentLine = word + ' '; } else currentLine = testLine;
                                    }); lines.push(currentLine);
                                });
                                const startY = (canvas.height / 2) - ((lines.length - 1) * 75 / 2);
                                lines.forEach((line, i) => ctx.fillText(line.trim(), canvas.width / 2, startY + (i * 75)));
                            }
                            const texture = new THREE.CanvasTexture(canvas);
                            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
                            this.el.setObject3D('mesh', new THREE.Mesh(new THREE.PlaneGeometry(1, 1), material));
                        }
                    });

                    ${requiresMediaPlay ? `
                    AFRAME.registerComponent('media-handler', {
                        schema: { target: {type: 'string'} },
                        init: function () {
                            const marker = this.el.closest('[mindar-image-target]'); const mediaEl = document.querySelector(this.data.target);
                            const onFound = () => { if (mediaEl) setTimeout(() => { mediaEl.play().catch(e => console.warn(e)); }, 150); };
                            const onLost = () => { if (mediaEl) mediaEl.pause(); };
                            if (marker) { marker.addEventListener('targetFound', onFound); marker.addEventListener('targetLost', onLost); }
                        }
                    });` : ''}
                    
                    AFRAME.registerComponent('marker-handler', {
                        init: function() {
                            const ui = document.getElementById('ui-layer');
                            this.el.addEventListener('targetFound', () => { if(ui) ui.style.display = 'none'; });
                            this.el.addEventListener('targetLost', () => { if(ui) ui.style.display = 'block'; });
                        }
                    });

                    function b64toBlob(b64Data, contentType='', sliceSize=512) {
                        const byteCharacters = atob(b64Data);
                        const byteArrays = [];
                        for (let offset = 0; offset < byteCharacters.length; offset += sliceSize) {
                            const slice = byteCharacters.slice(offset, offset + sliceSize);
                            const byteNumbers = new Array(slice.length);
                            for (let i = 0; i < slice.length; i++) byteNumbers[i] = slice.charCodeAt(i);
                            byteArrays.push(new Uint8Array(byteNumbers));
                        }
                        return new Blob(byteArrays, {type: contentType});
                    }

                    document.addEventListener("DOMContentLoaded", function() {
                        const b64Data = "${base64MindData}";
                        const blob = b64toBlob(b64Data, 'application/octet-stream');
                        const blobUrl = URL.createObjectURL(blob);

                        const sceneEl = document.createElement('a-scene');
                        sceneEl.setAttribute('mindar-image', 'imageTargetSrc: ' + blobUrl + '; autoStart: true; uiScanning: no;');
                        sceneEl.setAttribute('color-space', 'sRGB');
                        sceneEl.setAttribute('renderer', 'colorManagement: true, physicallyCorrectLights');
                        sceneEl.setAttribute('vr-mode-ui', 'enabled: false');
                        sceneEl.setAttribute('device-orientation-permission-ui', 'enabled: false');

                        sceneEl.innerHTML = '<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>' + 
                                            '${safeAssets}' + 
                                            '<a-entity mindar-image-target="targetIndex: 0" marker-handler>${safeEntity}</a-entity>';
                                            
                        document.body.appendChild(sceneEl);
                        
                        // Unlock media with click
                        document.body.addEventListener('click', () => {
                            const AudioContext = window.AudioContext || window.webkitAudioContext;
                            if (AudioContext) { const ctx = new AudioContext(); ctx.resume(); }
                            document.querySelectorAll('video, audio').forEach(el => { if(el.tagName === 'VIDEO') el.muted = false; el.load(); });
                        }, {once: true});
                    });
                ${sEnd}
            </head>
            <body>${uiHtml}</body>
            </html>`;
        }

        async function startARCamera() {
            const container = document.getElementById('ar-fullscreen-container');
            const scanUI = document.getElementById('ar-scan-ui');
            const overlay = document.getElementById('ar-content-overlay');
            
            const step = state.tours.find(t => t.id === state.playState.tourId).steps[state.playState.currentStep];

            if (!step.triggerImageB64 || step.triggerImageB64 === defaultB64) {
                showDialog("Error: Aquesta activitat no té un patró d'activació configurat correctament.", "alert", () => {
                    nextStep();
                });
                return;
            }

            container.classList.remove('hidden');
            scanUI.classList.remove('hidden');
            overlay.classList.add('hidden');
            
            scanUI.innerHTML = `
                <div class="flex flex-col justify-center items-center h-full text-white w-full max-w-md mx-auto p-4 text-center">
                    <i class="ph ph-spinner animate-spin text-6xl text-emerald-500 mb-6"></i>
                    <h2 class="text-2xl font-bold mb-2 tracking-wide">Iniciant Càmera i Entorn AR...</h2>
                    <div class="w-full h-3 bg-gray-700 rounded-full overflow-hidden shadow-inner mt-6">
                        <div id="compilerProgressBar" class="h-full bg-emerald-500 w-0 transition-all duration-300"></div>
                    </div>
                    <p id="compilerProgressText" class="text-emerald-300 font-mono text-sm mt-3 font-semibold">0%</p>
                </div>
                <button onclick="closeARCamera(true)" class="absolute top-6 right-6 w-14 h-14 bg-white/20 backdrop-blur text-white rounded-full flex items-center justify-center z-[200]"><i class="ph-bold ph-x text-2xl"></i></button>
            `;

            try {
                const img = new Image();
                img.src = step.triggerImageB64;
                await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; });

                if (!window.MindARCompiler) {
                    showDialog("El compilador MindAR no està disponible. Comproveu la connexió.");
                    closeARCamera(true);
                    return;
                }

                const compiler = new window.MindARCompiler();
                await compiler.compileImageTargets([img], (progress) => {
                    const pct = Math.round(progress);
                    const bar = document.getElementById('compilerProgressBar');
                    const txt = document.getElementById('compilerProgressText');
                    if (bar) bar.style.width = `${pct}%`;
                    if (txt) txt.innerText = `${pct}%`;
                });

                const exportedBuffer = await compiler.exportData();
                const base64MindData = bufferToBase64(exportedBuffer);
                
                // Ara la generació HTML és completament asíncrona a l'interior de l'iframe, sense esperes molestes
                const finalHtml = generateAFrameHTML(step, base64MindData);
                
                scanUI.classList.add('hidden'); 
                
                overlay.innerHTML = `
                    <iframe id="ar-iframe" allow="camera; microphone; accelerometer; magnetometer; gyroscope; display-capture" class="w-full h-full border-0 absolute inset-0 z-10" style="background: black;"></iframe>
                    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-[200]">
                        <button onclick="closeARCamera(false)" class="px-8 py-4 bg-emerald-600 text-white font-bold rounded-full shadow-2xl border border-emerald-500 flex items-center gap-2 hover:bg-emerald-500 transition hover:scale-105">
                            Continuar <i class="ph-bold ph-arrow-right"></i>
                        </button>
                    </div>
                `;
                overlay.classList.remove('hidden');

                const iframe = document.getElementById('ar-iframe');
                iframe.contentWindow.document.open();
                iframe.contentWindow.document.write(finalHtml);
                iframe.contentWindow.document.close();

            } catch(e) {
                console.error("Error AR:", e);
                showDialog("S'ha produït un error al compilar l'entorn AR.");
                closeARCamera(true);
            }
        }

        function closeARCamera(skipNextStep = false) {
            document.getElementById('ar-fullscreen-container').classList.add('hidden');
            document.getElementById('ar-scan-ui').innerHTML = ''; 
            document.getElementById('ar-content-overlay').innerHTML = ''; 
            
            if (!skipNextStep && state.view === 'play') {
                nextStep(); 
            }
        }
    </script>
</body>
</html>
