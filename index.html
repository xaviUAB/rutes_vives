            dl.click();
            dl.remove();
        }

        function generateAutonomousHTML() {
            const titleEl = document.getElementById('modalTourTitle');
            const descEl = document.getElementById('modalTourDesc');
            const trackEl = document.getElementById('modalTourTracking');
            
            if (titleEl) state.draftTour.title = titleEl.value.trim();
            if (descEl) state.draftTour.description = descEl.value.trim();
            if (trackEl) state.draftTour.trackingUrl = trackEl.value.trim();
            
            if (!state.draftTour.title) return showDialog("Cal afegir un títol al projecte abans de generar l'HTML. Feu clic a 'Desar projecte' per configurar-ho.");
            if (state.draftTour.steps.length === 0) return showDialog("Cal afegir almenys un contingut o etapa a la ruta.");

            let tourToExport = { ...state.draftTour, id: 'r-' + Date.now() };
            
            const cleanDoc = document.documentElement.cloneNode(true);
            
            const modalContainer = cleanDoc.querySelector('#modal-container');
            if (modalContainer) modalContainer.innerHTML = '';
            
            const dialogContainer = cleanDoc.querySelector('#dialog-container');
            if (dialogContainer) dialogContainer.innerHTML = '';
            
            const appContainer = cleanDoc.querySelector('#app');
            if (appContainer) appContainer.innerHTML = '';
            
            cleanDoc.querySelectorAll('a-scene').forEach(el => el.remove());
            cleanDoc.querySelectorAll('#debug-info').forEach(el => el.remove());
            cleanDoc.querySelectorAll('#autonomous-data').forEach(el => el.remove());
            
            // Neteja de scripts injectats automàticament per l'entorn d'edició d'IA
            // Fragmentem les paraules clau perquè aquest script no es detecti i s'elimini a si mateix!
            cleanDoc.querySelectorAll('script').forEach(script => {
                const text = script.textContent || '';
                const isFirebase = text.includes('firebase' + 'Config') || text.includes('__firebase' + '_config') || text.includes('firebase' + 'AuthBridge');
                const isModelInfo = text.includes('model' + 'Information');
                const isWs = script.hasAttribute('ws-interception-config');
                
                if (isFirebase || isModelInfo || isWs) {
                    script.remove();
                }
            });
            
            const safeJSON = JSON.stringify(tourToExport).replace(/</g, '\\u003c').replace(/>/g, '\\u003e');
            
            const newScript = document.createElement('script');
            newScript.id = 'autonomous-data';
            newScript.textContent = `
                window.isAutonomous = true;
                window.AUTONOMOUS_TOUR = ${safeJSON};
            `;
            cleanDoc.querySelector('head').insertBefore(newScript, cleanDoc.querySelector('head').firstChild);

            let htmlContent = cleanDoc.outerHTML;
            const finalFileContent = "<!DOCTYPE html>\n" + htmlContent;
            
            const blob = new Blob([finalFileContent], {type: "text/html;charset=utf-8"});
            const dl = document.createElement('a');
            dl.href = URL.createObjectURL(blob);
            dl.download = `${tourToExport.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_rutaviva_autonoma.html`;
            document.body.appendChild(dl);
            dl.click();
            dl.remove();
            closeModal();
        }

        function logInteraction(action, answer, score) {
            const tour = state.tours.find(t => t.id === state.playState.tourId);
            if (!tour || !tour.trackingUrl) return;
            
            const step = tour.steps[state.playState.currentStep];
            const elapsed = Date.now() - (state.playState.stepStartTime || Date.now());
            
            state.playState.interactionLogs.push({
                pas: state.playState.currentStep + 1,
                tipus_activitat: step.type,
                accio: action,
                resposta: answer || '',
                puntuacio: score || 0,
                temps_segons: Math.round(elapsed / 1000),
                data_hora: new Date().toISOString()
            });
        }
        
        function sendFinalLogs() {
            const tour = state.tours.find(t => t.id === state.playState.tourId);
            if (!tour || !tour.trackingUrl || state.playState.interactionLogs.length === 0) return;
            
            const payload = {
                ruta: tour.title,
                puntuacio_total: state.playState.score,
                max_puntuacio: state.playState.maxScore,
                finalitzat: new Date().toISOString(),
                detalls: state.playState.interactionLogs
            };
            
            fetch(tour.trackingUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(e => console.log('Notes: Tracking no enviat', e));
        }

        function checkTourAccess(id) {
            const tour = state.tours.find(t=>t.id===id);
            if (tour && tour.accessType === 'restricted') {
                if (!tour.trackingUrl) {
                    return showDialog("Aquesta ruta està restringida però no té cap servidor configurat per validar l'accés. Modifiqueu l'experiència per incloure la URL.", "alert");
                }
                
                showDialog("Aquesta experiència és privada. Introduïu el codi per començar:", "prompt", (code) => {
                    if (!code) return;
                    
                    const btnContainer = document.getElementById('dialogButtonsContainer');
                    if(btnContainer) btnContainer.innerHTML = `<div class="px-6 py-3 bg-slate-200 text-slate-600 rounded-xl font-bold flex items-center gap-2"><i class="ph ph-spinner animate-spin text-xl"></i> Validant...</div>`;

                    try {
                        fetch(tour.trackingUrl + '?action=verify&code=' + encodeURIComponent(code))
                            .then(res => res.text())
                            .then(text => {
                                try {
                                    const data = JSON.parse(text);
                                    if (data.valid) {
                                        state.dialogState.isOpen = false;
                                        renderDialogUI();
                                        startTour(id);
                                    } else {
                                        showDialog("El codi introduït no existeix o no és vàlid.", "alert");
                                    }
                                } catch(err) {
                                    showDialog("S'ha produït un error connectant amb el servidor. El codi o la URL no són vàlids.", "alert");
                                }
                            })
                            .catch(err => {
                                showDialog("S'ha produït un error de xarxa en validar el codi.", "alert");
                            });
                    } catch(e) {
                        showDialog("No s'ha pogut validar l'accés per un error de connexió.", "alert");
                    }
                }, "Codi (ex: 45A9)");
            } else {
                startTour(id);
            }
        }

        function startTour(id, startStepIndex = 0) {
            const tour = state.tours.find(t=>t.id===id);
            if (!tour || !tour.steps || tour.steps.length === 0) {
                showDialog("Aquesta ruta no té cap activitat. Afegiu-ne alguna abans d'iniciar l'experiència.");
                return;
            }
            
            const maxScore = tour.steps.reduce((acc, step) => acc + getStepMaxScore(step), 0);
            
            const initPlay = () => {
                state.playState = { tourId: id, currentStep: startStepIndex, score: 0, attempts: {}, completedSteps: {}, feedbackMsg: null, geoVerified: false, maxScore: maxScore, stepStartTime: Date.now(), interactionLogs: [], currentSortOrder: null };
                navigateTo('play');
            };

            initPlay();
        }

        function previewFromStep(i) {
            if (!state.draftTour.title) state.draftTour.title = "Previsualització";
            const id = 'temp-preview';
            const existing = state.tours.findIndex(t=>t.id===id);
            if (existing!==-1) state.tours[existing] = { ...state.draftTour, id };
            else state.tours.push({ ...state.draftTour, id });
            startTour(id, i);
        }

        window.visitWebLink = function(url) {
            const stepIndex = state.playState.currentStep;
            const step = state.tours.find(t=>t.id===state.playState.tourId).steps[stepIndex];
            
            if (!state.playState.completedSteps) state.playState.completedSteps = {};
            if (!state.playState.completedSteps[stepIndex]) {
                const scoreToAdd = step.scoreFirstTry !== undefined ? step.scoreFirstTry : 10;
                state.playState.score += scoreToAdd;
                state.playState.completedSteps[stepIndex] = true;
                logInteraction('Visita Web', url, state.playState.score);
                renderView();
            }
            window.open(url, '_blank');
        };

        function answerQuiz(i) {
            const step = state.tours.find(t=>t.id===state.playState.tourId).steps[state.playState.currentStep];
            if (!state.playState.attempts) state.playState.attempts = {};
            const stepIndex = state.playState.currentStep;
            if (state.playState.attempts[stepIndex] === undefined) state.playState.attempts[stepIndex] = 0;
            
            if (!state.playState.completedSteps) state.playState.completedSteps = {};
            if (state.playState.completedSteps[stepIndex]) {
                state.playState.feedbackMsg = step.successMsg || "Ja havíeu completat aquesta activitat.";
                state.playState.feedbackType = 'success';
                renderView();
                return;
            }
            
            const isFirstTry = state.playState.attempts[stepIndex] === 0;
            state.playState.attempts[stepIndex]++;

            if (i === step.correct) { 
                const scoreToAdd = isFirstTry ? (step.scoreFirstTry !== undefined ? step.scoreFirstTry : 10) : (step.scoreNextTries !== undefined ? step.scoreNextTries : 5);
                state.playState.score += scoreToAdd;
                state.playState.completedSteps[stepIndex] = true;
                state.playState.feedbackMsg = step.successMsg || "Correcte!"; 
                state.playState.feedbackType = 'success'; 
            } else { 
                state.playState.feedbackMsg = step.errorMsg || "Incorrecte."; 
                state.playState.feedbackType = 'error'; 
            }
            logInteraction('Respon Test', step.options[i], state.playState.score);
            renderView();
        }

        function verifyText(type) {
            const input = document.getElementById('playInput').value.trim().toLowerCase();
            const step = state.tours.find(t=>t.id===state.playState.tourId).steps[state.playState.currentStep];
            
            if (!state.playState.attempts) state.playState.attempts = {};
            const stepIndex = state.playState.currentStep;
            if (state.playState.attempts[stepIndex] === undefined) state.playState.attempts[stepIndex] = 0;
            
            if (!state.playState.completedSteps) state.playState.completedSteps = {};
            if (state.playState.completedSteps[stepIndex]) {
                state.playState.feedbackMsg = "Ja havíeu completat aquesta activitat.";
                state.playState.feedbackType = 'success';
                renderView();
                return;
            }

            const isFirstTry = state.playState.attempts[stepIndex] === 0;
            state.playState.attempts[stepIndex]++;

            if (type === 'question') {
                if (step.validAnswers.includes(input)) { 
                    const scoreToAdd = isFirstTry ? (step.scoreFirstTry !== undefined ? step.scoreFirstTry : 10) : (step.scoreNextTries !== undefined ? step.scoreNextTries : 5);
                    state.playState.score += scoreToAdd;
                    state.playState.completedSteps[stepIndex] = true;
                    state.playState.feedbackMsg = step.successMsg || "Molt bé!"; 
                    state.playState.feedbackType = 'success'; 
                } else { 
                    state.playState.feedbackMsg = step.errorMsg || "No és correcte."; 
                    state.playState.feedbackType = 'error'; 
                }
            } else if (type === 'scan_code') {
                if (input === step.code.toLowerCase()) {
                    state.playState.completedSteps[stepIndex] = true;
                    state.playState.feedbackMsg = "Codi validat correctament!";
                    state.playState.feedbackType = 'success';
                } else {
                    state.playState.feedbackMsg = "Codi invàlid. Torneu a comprovar-ho.";
                    state.playState.feedbackType = 'error';
                }
            } else { 
                state.playState.score += 5; 
                state.playState.completedSteps[stepIndex] = true;
                state.playState.feedbackMsg = "Missió completada."; 
                state.playState.feedbackType = 'success'; 
            }
            logInteraction(type === 'question' ? 'Respon Obertament' : 'Introdueix Codi/Missió', input, state.playState.score);
            renderView();
        }

        function verifySort() {
            const step = state.tours.find(t=>t.id===state.playState.tourId).steps[state.playState.currentStep];
            const currentOrder = state.playState.currentSortOrder;
            const isCorrect = step.correctOrder.every((item, i) => item === currentOrder[i]);
            
            if (!state.playState.attempts) state.playState.attempts = {};
            const stepIndex = state.playState.currentStep;
            if (state.playState.attempts[stepIndex] === undefined) state.playState.attempts[stepIndex] = 0;
            
            if (!state.playState.completedSteps) state.playState.completedSteps = {};
            if (state.playState.completedSteps[stepIndex]) {
                state.playState.feedbackMsg = "Ja havíeu completat aquesta activitat.";
                state.playState.feedbackType = 'success';
                renderView();
                return;
            }

            const isFirstTry = state.playState.attempts[stepIndex] === 0;
            state.playState.attempts[stepIndex]++;

            if (isCorrect) {
                const scoreToAdd = isFirstTry ? (step.scoreFirstTry !== undefined ? step.scoreFirstTry : 10) : (step.scoreNextTries !== undefined ? step.scoreNextTries : 5);
                state.playState.score += scoreToAdd;
                state.playState.completedSteps[stepIndex] = true;
                state.playState.feedbackMsg = "Ordre correcte! Molt bé.";
                state.playState.feedbackType = 'success';
            } else {
                state.playState.feedbackMsg = "L'ordre no és correcte. Torneu-ho a provar.";
                state.playState.feedbackType = 'error';
            }
            logInteraction('Respon Ordenar', currentOrder.join(', '), state.playState.score);
            renderView();
        }

        function answerSurvey() {
            const stepIndex = state.playState.currentStep;
            if (!state.playState.completedSteps) state.playState.completedSteps = {};
            if (!state.playState.completedSteps[stepIndex]) {
                state.playState.score += 5;
                state.playState.completedSteps[stepIndex] = true;
            }
            state.playState.feedbackMsg = "L'opció s'ha registrat correctament. Gràcies per participar!";
            state.playState.feedbackType = 'success';
            logInteraction('Enquesta', 'Completada', state.playState.score);
            renderView();
        }

        function nextStep() {
            state.playState.feedbackMsg = null;
            state.playState.geoVerified = false;
            state.playState.currentSortOrder = null;
            
            const tour = state.tours.find(t=>t.id===state.playState.tourId);
            
            if (state.playState.currentStep < tour.steps.length - 1) {
                state.playState.currentStep++;
                state.playState.stepStartTime = Date.now();
                renderView();
            } else {
                sendFinalLogs();
                navigateTo('summary');
            }
        }

        window.previousStep = function() {
            if (state.playState.currentStep > 0) {
                state.playState.currentStep--;
                state.playState.feedbackMsg = null;
                state.playState.geoVerified = false;
                state.playState.currentSortOrder = null;
                state.playState.stepStartTime = Date.now();
                renderView();
            }
        };

        function retryStep() { state.playState.feedbackMsg = null; renderView(); }
        
        function confirmExit() { 
            showDialog("Voleu sortir de l'experiència?", "confirm", () => {
                if (state.playState.tourId === 'temp-preview') {
                    navigateTo('create');
                } else {
                    navigateTo('home');
                }
            }); 
        }

        function confirmSummaryExit() {
            if (state.playState.tourId === 'temp-preview') {
                navigateTo('create');
            } else {
                navigateTo('home');
            }
        }

        function bufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            const len = bytes.byteLength;
            const chunkSize = 0x8000;
            for (let i = 0; i < len; i += chunkSize) {
                binary += String.fromCharCode.apply(null, bytes.subarray(i, Math.min(i + chunkSize, len)));
            }
            return window.btoa(binary);
        }

        function parseGoogleDriveUrl(url, type) {
            if (!url || url.startsWith('data:')) return url;
            const match = url.match(/(?:https:\/\/)?(?:drive\.google\.com\/)(?:file\/d\/|open\?id=)([\w-]+)/);
            if (match && match[1]) return type === 'image' ? `https://lh3.googleusercontent.com/d/${match[1]}` : `https://drive.google.com/uc?export=download&id=${match[1]}`;
            return url; 
        }

        function generateAFrameHTML(step, b64DataOnly) {
            const cType = step.arType;
            const rawUrl = step.arContent;
            const cUrlSafe = parseGoogleDriveUrl(rawUrl, cType);
            
            let assetsHtml = '<a-assets timeout="10000">';
            let entityHtml = '';
            
            if (cType === 'text') {
                const safeText = rawUrl.replace(/"/g, '&quot;').replace(/\n/g, ' ');
                entityHtml = `<a-entity dynamic-text="text: ${safeText}; textColor: #ffffff; bgColor: #4f46e5" position="0 0 0" rotation="0 0 0"></a-entity>`;
            } else if (cType === 'image') {
                entityHtml = `<a-entity robust-image="src: ${cUrlSafe}" position="0 0 0" rotation="0 0 0"></a-entity>`;
            } else if (cType === 'video') {
                assetsHtml += `<video id="vid" src="${cUrlSafe}" crossorigin="anonymous" loop muted autoplay playsinline webkit-playsinline></video>`;
                entityHtml = `<a-video src="#vid" position="0 0 0" rotation="0 0 0" scale="1 1 1" auto-ratio play-on-found></a-video>`;
            } else if (cType === 'audio') {
                assetsHtml += `<audio id="aud" src="${cUrlSafe}" crossorigin="anonymous" loop></audio>`;
                entityHtml = `<a-entity dynamic-text="text: 🔊 Àudio en Marxa; textColor: #ffffff; bgColor: #4f46e5" position="0 0 0"></a-entity><a-entity sound="src: #aud" play-on-found></a-entity>`;
            } else if (cType === '3d') {
                entityHtml = `<a-entity gltf-model="${cUrlSafe}" position="0 0 0" rotation="0 0 0" auto-scale-model="userScale: 1.0" drag-rotate animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"></a-entity>`;
            }

            assetsHtml += '</a-assets>';

            const uiHtml = `
            <div id="ui-layer" style="position: absolute; top: 20px; width: 100%; text-align: center; color: white; z-index: 100; pointer-events: none; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); font-family: sans-serif;">
                <h2>Enfoqueu l'activador per interactuar</h2>
            </div>
            <div id="cam-error" style="display:none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: white; z-index: 99999; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; font-family: sans-serif;">
                <h3 style="color: #ef4444; margin-bottom: 10px;">Accés a la càmera denegat o no disponible</h3>
                <p style="font-size: 14px; max-width: 400px;">Si heu obert aquest fitxer directament (file://), els navegadors bloquegen la càmera per seguretat. Pugeu el fitxer a un servidor web o utilitzeu un entorn local (localhost).</p>
            </div>`;

            const sEnd = "</" + "script>";

            return `<!DOCTYPE html>
            <html lang="ca">
            <head>
                <meta charset="utf-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>AR Experience</title>
                <style>body { margin: 0; overflow: hidden; background: transparent; } #cam-error { display: none !important; }</style>
                <script>
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        document.addEventListener("DOMContentLoaded", function() {
                            var errDiv = document.getElementById('cam-error');
                            if (errDiv) errDiv.style.display = 'flex';
                            var uiLayer = document.getElementById('ui-layer');
                            if (uiLayer) uiLayer.style.display = 'none';
                        });
                    }
                ${sEnd}
                <script src="https://aframe.io/releases/1.4.2/aframe.min.js">${sEnd}
                <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js">${sEnd}
                <script>
                    AFRAME.registerComponent('ar-event-handler', {
                        init: function () {
                            const target = this.el;
                            target.addEventListener('targetFound', () => {
                                window.parent.postMessage('arTargetFound', '*');
                            });
                        }
                    });

                    AFRAME.registerComponent('auto-scale-model', {
                        schema: { userScale: {type: 'number', default: 1.0} },
                        init: function () {
                            let scaleApplied = false;
                            this.el.addEventListener('model-loaded', () => {
                                if (scaleApplied) return;
                                const model = this.el.getObject3D('mesh');
                                if (!model) return;
                                
                                const clone = model.clone();
                                clone.position.set(0,0,0);
                                clone.rotation.set(0,0,0);
                                clone.scale.set(1,1,1);
                                clone.updateMatrixWorld(true);
                                clone.traverse(node => { if (node.isMesh && node.geometry) node.geometry.computeBoundingBox(); });
                                
                                const box = new THREE.Box3().setFromObject(clone);
                                const size = new THREE.Vector3(); box.getSize(size);
                                const center = new THREE.Vector3(); box.getCenter(center);
                                
                                const maxDim = Math.max(size.x, size.y, size.z);
                                if (maxDim > 0 && maxDim !== Infinity && !isNaN(maxDim)) {
                                    const targetScale = this.data.userScale / maxDim;
                                    this.el.setAttribute('scale', targetScale + ' ' + targetScale + ' ' + targetScale);
                                    model.position.set(-center.x, -center.y, -center.z);
                                    scaleApplied = true;
                                }
                            });
                        }
                    });

                    AFRAME.registerComponent('robust-image', {
                        schema: { src: { type: 'string' } },
                        init: function () {
                            const el = this.el;
                            const originalUrl = this.data.src;
                            if (!originalUrl) return;

                            const urlsToTry = [
                                originalUrl,
                                'https://corsproxy.io/?' + encodeURIComponent(originalUrl),
                                'https://images.weserv.nl/?url=' + encodeURIComponent(originalUrl),
                                'https://api.allorigins.win/raw?url=' + encodeURIComponent(originalUrl)
                            ];

                            let currentAttempt = 0;
                            const loader = new THREE.TextureLoader();
                            loader.setCrossOrigin('anonymous');

                            const applyTexture = (img, textureObj) => {
                                let tex = textureObj;
                                if (!tex) {
                                    tex = new THREE.Texture(img);
                                    tex.needsUpdate = true;
                                }
                                const material = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true });
                                
                                const w = img.width || img.videoWidth || img.naturalWidth;
                                const h = img.height || img.videoHeight || img.naturalHeight;
                                if (w && h) {
                                    el.setObject3D('mesh', new THREE.Mesh(new THREE.PlaneGeometry(1, h / w), material));
                                } else {
                                    el.setObject3D('mesh', new THREE.Mesh(new THREE.PlaneGeometry(1, 1), material));
                                }
                            };

                            const tryFetchBase64 = async (url) => {
                                try {
                                    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
                                    const response = await fetch(proxyUrl);
                                    if (!response.ok) throw new Error('Fetch fallit');
                                    const blob = await response.blob();
                                    const reader = new FileReader();
                                    reader.onloadend = () => {
                                        const img = new Image();
                                        img.onload = () => applyTexture(img);
                                        img.src = reader.result;
                                    };
                                    reader.readAsDataURL(blob);
                                } catch (e) {
                                    console.error('Error carregant imatge AR');
                                }
                            };

                            const tryNextUrl = () => {
                                if (currentAttempt >= urlsToTry.length) {
                                    tryFetchBase64(originalUrl);
                                    return;
                                }
                                const url = urlsToTry[currentAttempt];
                                currentAttempt++;
                                
                                loader.load(
                                    url,
                                    (texture) => applyTexture(texture.image, texture),
                                    undefined,
                                    (err) => { tryNextUrl(); }
                                );
                            };
                            tryNextUrl();
                        }
                    });

                    AFRAME.registerComponent('dynamic-text', {
                        schema: { text: {type: 'string', default: ''}, textColor: {type: 'string', default: '#ffffff'}, bgColor: {type: 'string', default: '#000000'}, transparent: {type: 'boolean', default: false} },
                        init: function () {
                            const canvas = document.createElement('canvas');
                            canvas.width = 1024;
                            canvas.height = 1024;
                            const ctx = canvas.getContext('2d');
                            
                            if (!this.data.transparent) {
                                ctx.fillStyle = this.data.bgColor;
                                ctx.globalAlpha = 0.85;
                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                                ctx.globalAlpha = 1.0;
                            }
                            
                            ctx.fillStyle = this.data.textColor;
                            ctx.font = 'bold 60px sans-serif';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            
                            const words = this.data.text.split(' ');
                            let line = '';
                            const lines = [];
                            
                            for(let n = 0; n < words.length; n++) {
                                const testLine = line + words[n] + ' ';
                                const metrics = ctx.measureText(testLine);
                                if (metrics.width > 900 && n > 0) {
                                    lines.push(line);
                                    line = words[n] + ' ';
                                } else {
                                    line = testLine;
                                }
                            }
                            lines.push(line);
                            
                            const lineHeight = 80;
                            const startY = (canvas.height / 2) - ((lines.length - 1) * lineHeight / 2);
                            for(let k = 0; k < lines.length; k++) {
                                ctx.fillText(lines[k].trim(), canvas.width / 2, startY + (k * lineHeight));
                            }
                            
                            const texture = new THREE.CanvasTexture(canvas);
                            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide });
                            this.el.setObject3D('mesh', new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));
                        }
                    });

                    AFRAME.registerComponent('drag-rotate', {
                        init: function () {
                            this.isDragging = false;
                            this.previousPosition = { x: 0, y: 0 };
                            
                            const onDown = (e) => {
                                this.isDragging = true;
                                const touch = e.touches ? e.touches[0] : e;
                                this.previousPosition.x = touch.clientX;
                                this.previousPosition.y = touch.clientY;
                            };
                            
                            const onUp = () => { this.isDragging = false; };
                            
                            const onMove = (e) => {
                                if (!this.isDragging) return;
                                const touch = e.touches ? e.touches[0] : e;
                                const deltaMove = {
                                    x: touch.clientX - this.previousPosition.x,
                                    y: touch.clientY - this.previousPosition.y
                                };
                                
                                const rotation = this.el.getAttribute('rotation');
                                this.el.setAttribute('rotation', {
                                    x: rotation.x - deltaMove.y * 0.5,
                                    y: rotation.y + deltaMove.x * 0.5,
                                    z: rotation.z
                                });
                                
                                this.previousPosition.x = touch.clientX;
                                this.previousPosition.y = touch.clientY;
                            };
                            
                            document.addEventListener('mousedown', onDown);
                            document.addEventListener('touchstart', onDown, {passive: true});
                            document.addEventListener('mouseup', onUp);
                            document.addEventListener('touchend', onUp);
                            document.addEventListener('mousemove', onMove);
                            document.addEventListener('touchmove', onMove, {passive: true});
                        }
                    });

                    AFRAME.registerComponent('auto-ratio', {
                        init: function () {
                            const el = this.el; 
                            let ratioApplied = false;
                            const applyRatio = (w, h) => { 
                                if (w && h && !ratioApplied) { 
                                    el.setAttribute('width', 1);
                                    el.setAttribute('height', h / w);
                                    ratioApplied = true; 
                                } 
                            };
                            if (el.tagName.toLowerCase() === 'a-video') {
                                const srcId = el.getAttribute('src');
                                if (srcId && srcId.startsWith('#')) {
                                    const videoEl = document.querySelector(srcId);
                                    if (videoEl) {
                                        const checkAndApply = () => { if (videoEl.videoWidth > 0) applyRatio(videoEl.videoWidth, videoEl.videoHeight); };
                                        videoEl.addEventListener('loadedmetadata', checkAndApply);
                                        videoEl.addEventListener('playing', checkAndApply);
                                    }
                                }
                            }
                        }
                    });

                    AFRAME.registerComponent('play-on-found', {
                        init: function () {
                            var el = this.el;
                            var target = document.querySelector('[mindar-image-target]');
                            target.addEventListener('targetFound', () => {
                                if (el.tagName === 'A-VIDEO') {
                                    var vid = document.querySelector('#vid');
                                    if(vid) vid.play();
                                } else if (el.components.sound) {
                                    el.components.sound.playSound();
                                }
                            });
                            target.addEventListener('targetLost', () => {
                                if (el.tagName === 'A-VIDEO') {
                                    var vid = document.querySelector('#vid');
                                    if(vid) vid.pause();
                                } else if (el.components.sound) {
                                    el.components.sound.pauseSound();
                                }
                            });
                        }
                    });
                ${sEnd}
            </head>
            <body>
                ${uiHtml}
                <script>
                    document.addEventListener("DOMContentLoaded", function() {
                        
                        function b64toBlob(b64Data, contentType = '', sliceSize = 1024) {
                            const byteCharacters = atob(b64Data);
                            const byteArrays = [];
                            for (let offset = 0; offset < byteCharacters.length; offset += sliceSize) {
                                const slice = byteCharacters.slice(offset, offset + sliceSize);
                                const byteNumbers = new Array(slice.length);
                                for (let i = 0; i < slice.length; i++) {
                                    byteNumbers[i] = slice.charCodeAt(i);
                                }
                                byteArrays.push(new Uint8Array(byteNumbers));
                            }
                            return new Blob(byteArrays, {type: contentType});
                        }

                        const b64DataStr = "${b64DataOnly}";
                        const blob = b64toBlob(b64DataStr, 'application/octet-stream');
                        const blobUrl = URL.createObjectURL(blob);

                        const sceneEl = document.createElement('a-scene');
                        sceneEl.setAttribute('mindar-image', 'imageTargetSrc: ' + blobUrl + '; autoStart: true; uiScanning: no;');
                        sceneEl.setAttribute('color-space', 'sRGB');
                        sceneEl.setAttribute('renderer', 'colorManagement: true, physicallyCorrectLights');
                        sceneEl.setAttribute('vr-mode-ui', 'enabled: false');
                        sceneEl.setAttribute('device-orientation-permission-ui', 'enabled: false');
                        
                        sceneEl.setAttribute('gltf-model', 'dracoDecoderPath: https://www.gstatic.com/draco/v1/decoders/; meshoptDecoderPath: https://unpkg.com/meshoptimizer@0.19.0/meshopt_decoder.js; basisTranscoderPath: https://cdn.jsdelivr.net/gh/mrdoob/three.js@r147/examples/jsm/libs/basis/;');

                        sceneEl.innerHTML = '<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>' + 
                                            '<a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>' +
                                            '<a-light type="directional" color="#ffffff" intensity="1" position="-1 2 1"></a-light>' +
                                            \`${assetsHtml}\` + 
                                            '<a-entity mindar-image-target="targetIndex: 0" ar-event-handler>' + 
                                            \`${entityHtml}\` + 
                                            '</a-entity>';
                                            
                        document.body.appendChild(sceneEl);
                        
                        document.body.addEventListener('click', () => {
                            const AudioContext = window.AudioContext || window.webkitAudioContext;
                            if (AudioContext) { const ctx = new AudioContext(); ctx.resume(); }
                        }, {once: true});
                        
                        setTimeout(() => {
                            const target = document.querySelector('[mindar-image-target]');
                            if(target) {
                                target.addEventListener('targetFound', () => { 
                                    document.getElementById('ui-layer').style.display = 'none'; 
                                });
                                target.addEventListener('targetLost', () => { document.getElementById('ui-layer').style.display = 'block'; });
                            }
                        }, 1000);
                        
                    });
                ${sEnd}
            </body>
            </html>`;
        }

        async function startARCamera() {
            const container = document.getElementById('ar-fullscreen-container');
            const scanUI = document.getElementById('ar-scan-ui');
            const overlay = document.getElementById('ar-content-overlay');
            
            const step = state.tours.find(t => t.id === state.playState.tourId).steps[state.playState.currentStep];

            if (!step.triggerImageB64 || step.triggerImageB64 === defaultB64) {
                showDialog("Error: Aquesta activitat no té un patró d'activació configurat correctament.", "alert", () => {
                    nextStep();
                });
                return;
            }

            // OBRIR INTERFÍCIE IMMEDIATAMENT PERQUÈ LA PERSONA VEGI QUE EL BOTÓ HA REACCIONAT
            window.arTriggerDetected = false;
            container.classList.remove('hidden');
            scanUI.classList.remove('hidden');
            overlay.classList.add('hidden');
            
            scanUI.innerHTML = `
                <div class="flex flex-col justify-center items-center h-full text-white w-full max-w-md mx-auto p-4 text-center">
                    <i class="ph ph-spinner animate-spin text-6xl text-emerald-500 mb-6"></i>
                    <h2 class="text-2xl font-bold mb-2 tracking-wide">Iniciant Càmera i Entorn AR...</h2>
                    <p class="text-gray-300 text-sm mb-4">S'està preparant la detecció visual amb MindAR.</p>
                    <p id="camera-warning" class="text-yellow-400 text-xs mb-4 font-bold max-w-xs"></p>
                    <div class="w-full h-3 bg-gray-700 rounded-full overflow-hidden shadow-inner">
                        <div id="compilerProgressBar" class="h-full bg-emerald-500 w-0 transition-all duration-300"></div>
                    </div>
                    <p id="compilerProgressText" class="text-emerald-300 font-mono text-sm mt-3 font-semibold">0%</p>
                </div>
                <button onclick="closeARCamera(true)" class="absolute top-6 right-6 w-14 h-14 bg-white/20 backdrop-blur text-white rounded-full flex items-center justify-center z-[200]"><i class="ph-bold ph-x text-2xl"></i></button>
            `;

            // Demanar permís de càmera en segon pla només si som a l'editor.
            // No bloqueja l'execució (sense "await") així el MindAR pot anar compilant la imatge.
            if (!window.isAutonomous) {
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                        .then(stream => stream.getTracks().forEach(t => t.stop()))
                        .catch(err => {
                            const warnEl = document.getElementById('camera-warning');
                            if (warnEl) warnEl.innerText = "Si us plau, autoritzeu l'ús de la càmera al navegador per continuar.";
                        });
                }
            }

            try {
                const img = new Image();
                img.src = step.triggerImageB64;
                await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; });

                if (!window.MindARCompiler) {
                    showDialog("El compilador MindAR no està disponible. Comproveu la connexió.");
                    closeARCamera(true);
                    return;
                }

                const compiler = new window.MindARCompiler();
                await compiler.compileImageTargets([img], (progress) => {
                    const pct = Math.round(progress);
                    const bar = document.getElementById('compilerProgressBar');
                    const txt = document.getElementById('compilerProgressText');
                    if (bar) bar.style.width = `${pct}%`;
                    if (txt) txt.innerText = `${pct}%`;
                });

                const exportedBuffer = await compiler.exportData();
                const base64MindData = bufferToBase64(exportedBuffer);
                
                const finalHtml = generateAFrameHTML(step, base64MindData);
                
                scanUI.classList.add('hidden'); 
                
                overlay.innerHTML = `
                    <iframe id="ar-iframe" sandbox="allow-scripts allow-same-origin allow-popups allow-forms" allow="camera *; microphone *; accelerometer *; magnetometer *; gyroscope *; display-capture *; autoplay *; fullscreen *; xr-spatial-tracking *" class="w-full h-full border-0 absolute inset-0 z-10" style="background: transparent;"></iframe>
                    <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-[200] flex gap-3">
                        <button id="ar-dual-btn" onclick="handleARAction()" class="px-8 py-4 bg-orange-500 text-white font-bold rounded-full shadow-2xl border border-orange-400 flex items-center gap-2 hover:bg-orange-400 transition hover:scale-105">
                            Pista <i class="ph-bold ph-lightbulb"></i>
                        </button>
                        <button id="ar-skip-btn" onclick="skipARActivity()" class="px-6 py-4 bg-slate-700 text-white font-bold rounded-full shadow-2xl border border-slate-600 flex items-center gap-2 hover:bg-slate-600 transition hover:scale-105" title="Saltar activitat">
                            Saltar <i class="ph-bold ph-fast-forward"></i>
                        </button>
                    </div>
                `;
                overlay.classList.remove('hidden');

                const iframe = document.getElementById('ar-iframe');
                iframe.srcdoc = finalHtml;

                logInteraction('Detecta AR', 'Càmera Iniciada amb MindAR', 0);

            } catch(e) {
                console.error("Error AR:", e);
                showDialog("S'ha produït un error al compilar l'entorn AR.");
                closeARCamera(true);
            }
        }

        function handleARAction() {
            if (window.arTriggerDetected) {
                closeARCamera(false);
            } else {
                const step = state.tours.find(t => t.id === state.playState.tourId).steps[state.playState.currentStep];
                showDialog(`
                    <div class="flex flex-col items-center gap-4">
                        <p class="text-sm font-bold text-slate-600 uppercase">Imatge d'activació</p>
                        <img src="${step.triggerImageB64}" class="max-h-64 rounded-xl border-4 border-slate-100 shadow-sm">
                        <p class="text-xs text-slate-500">Busqueu aquesta imatge i enfoqueu-la amb la càmera per activar el contingut.</p>
                    </div>
                `, 'alert');
            }
        }

        window.addEventListener('message', (event) => {
            if (event.data === 'arTargetFound') {
                if (!window.arTriggerDetected) {
                    window.arTriggerDetected = true;
                    
                    const btn = document.getElementById('ar-dual-btn');
                    const skipBtn = document.getElementById('ar-skip-btn');
                    if (btn) {
                        btn.innerHTML = 'Continuar <i class="ph-bold ph-arrow-right"></i>';
                        btn.classList.remove('bg-orange-500', 'border-orange-400', 'hover:bg-orange-400');
                        btn.classList.add('bg-emerald-600', 'border-emerald-500', 'hover:bg-emerald-500');
                    }
                    if (skipBtn) {
                        skipBtn.classList.add('hidden');
                    }

                    if (state.view === 'play' && state.playState.tourId) {
                        const stepIndex = state.playState.currentStep;
                        const tour = state.tours.find(t => t.id === state.playState.tourId);
                        if (tour && tour.steps && tour.steps[stepIndex]) {
                            const step = tour.steps[stepIndex];
                            if (!state.playState.attempts) state.playState.attempts = {};
                            if (!state.playState.attempts[stepIndex]) {
                                state.playState.attempts[stepIndex] = 1;
                            }
                            if (!state.playState.completedSteps) state.playState.completedSteps = {};
                            if (!state.playState.completedSteps[stepIndex]) {
                                state.playState.completedSteps[stepIndex] = true;
                                state.playState.score += (step.scoreFirstTry !== undefined ? step.scoreFirstTry : 10);
                                logInteraction('AR Completada', 'Imatge Detectada', state.playState.score);
                            }
                        }
                    }
                }
            }
        });

        function skipARActivity() {
            showDialog("Voleu saltar aquesta activitat d'exploració? L'activitat quedarà omesa.", "confirm", () => {
                const step = state.tours.find(t => t.id === state.playState.tourId).steps[state.playState.currentStep];
                logInteraction('Salta AR', 'Activitat omesa', 0);
                
                document.getElementById('ar-fullscreen-container').classList.add('hidden');
                document.getElementById('ar-scan-ui').innerHTML = ''; 
                document.getElementById('ar-content-overlay').innerHTML = ''; 
                
                const isRequired = step.requireCorrect !== undefined ? step.requireCorrect : false;

                if (isRequired) {
                    state.playState.feedbackMsg = "Activitat omesa. És necessari completar-la per avançar.";
                    state.playState.feedbackType = 'error';
                    renderView();
                } else {
                    nextStep();
                }
            });
        }

        function closeARCamera(skipNextStep = false) {
            document.getElementById('ar-fullscreen-container').classList.add('hidden');
            document.getElementById('ar-scan-ui').innerHTML = ''; 
            document.getElementById('ar-content-overlay').innerHTML = ''; 
            
            if (!skipNextStep && state.view === 'play') {
                nextStep(); 
            }
        }
        
        window.state = state;
        window.renderAll = renderAll;
        window.renderView = renderView;
        window.renderModal = renderModal;
        window.renderDialogUI = renderDialogUI;
        window.showDialog = showDialog;
        window.closeDialog = closeDialog;
        window.renderHome = renderHome;
        window.renderList = renderList;
        window.renderStepPreviewSimulator = renderStepPreviewSimulator;
        window.renderCreate = renderCreate;
        window.setPreviewStep = setPreviewStep;
        window.handleTriggerUpload = handleTriggerUpload;
        window.renderDynamicModal = renderDynamicModal;
        window.renderPlay = renderPlay;
        window.renderSummary = renderSummary;
        window.navigateTo = navigateTo;
        window.getVisualsForStepType = getVisualsForStepType;
        window.initMapForCreation = initMapForCreation;
        window.updateMapCircle = updateMapCircle;
        window.initMapForPlay = initMapForPlay;
        window.toggleGeoPanel = toggleGeoPanel;
        window.verifyGeoPosition = verifyGeoPosition;
        window.getDistanceFromLatLonInM = getDistanceFromLatLonInM;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.saveStepFromModal = saveStepFromModal;
        window.removeStep = removeStep;
        window.moveStep = moveStep;
        window.moveSortItem = moveSortItem;
        window.addQuizOption = addQuizOption;
        window.removeQuizOption = removeQuizOption;
        window.startCreation = startCreation;
        window.editTour = editTour;
        window.finalizeSaveTour = finalizeSaveTour;
        window.triggerDownloadJSON = triggerDownloadJSON;
        window.generateAutonomousHTML = generateAutonomousHTML;
        window.logInteraction = logInteraction;
        window.sendFinalLogs = sendFinalLogs;
        window.checkTourAccess = checkTourAccess;
        window.startTour = startTour;
        window.previewFromStep = previewFromStep;
        window.answerQuiz = answerQuiz;
        window.verifyText = verifyText;
        window.verifySort = verifySort;
        window.answerSurvey = answerSurvey;
        window.nextStep = nextStep;
        window.retryStep = retryStep;
        window.confirmExit = confirmExit;
        window.confirmSummaryExit = confirmSummaryExit;
        window.importTours = importTours;
        window.bufferToBase64 = bufferToBase64;
        window.parseGoogleDriveUrl = parseGoogleDriveUrl;
        window.generateAFrameHTML = generateAFrameHTML;
        window.startARCamera = startARCamera;
        window.closeARCamera = closeARCamera;
        window.skipARActivity = skipARActivity;
        window.syncModalState = syncModalState;
        window.visitWebLink = visitWebLink;
    </script>
</body>
