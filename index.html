<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RutaViva - Experiències Gamificades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Simulació de l'entorn A-Frame per poder carregar el compilador de MindAR sense alterar la interfície gràfica -->
    <script>
        window.AFRAME = {
            registerComponent: function() {},
            registerSystem: function() {},
            registerPrimitive: function() {},
            registerGeometry: function() {},
            registerShader: function() {},
            components: {},
            systems: {}
        };
        const originalConsoleError = console.error;
        console.error = function(...args) {
            const msg = args.join(' ');
            if (msg.includes('is not valid JSON') || msg.includes('Unexpected token') || msg.includes('404')) return; 
            originalConsoleError.apply(console, args);
        };
        window.addEventListener('unhandledrejection', function(event) {
            if (event.reason && (event.reason.toString().includes('JSON') || event.reason.toString().includes('Unexpected token'))) {
                event.preventDefault(); 
            }
        });
    </script>
    <script type="module">
        import { Compiler } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js';
        window.MindARCompiler = Compiler;
    </script>

    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; color: #0f172a; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 0.5rem; }
        .video-container iframe, .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        model-viewer { width: 100%; height: 300px; background-color: #f1f5f9; border-radius: 0.75rem; border: 1px solid #e2e8f0; }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        /* Simulador Mòbil */
        .mobile-simulator {
            width: 320px;
            height: 568px;
            border-radius: 2.5rem;
            border: 12px solid #0f172a;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            background: #f8fafc;
            overflow-y: auto;
            position: relative;
        }
        .mobile-simulator::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="app" class="min-h-screen flex flex-col relative z-0"></div>
    <div id="modal-container" class="relative z-[50]"></div>
    <div id="dialog-container" class="relative z-[200]"></div>

    <div id="ar-fullscreen-container" class="fixed inset-0 z-[100] hidden bg-black flex flex-col">
        <video id="ar-video-feed" class="absolute inset-0 w-full h-full object-cover" autoplay playsinline></video>
        <div id="ar-scan-ui" class="absolute inset-0 flex flex-col items-center justify-center z-10">
            <div id="ar-ghost-container" class="relative w-72 h-72 border-4 border-dashed border-white/70 rounded-2xl overflow-hidden mb-6 bg-black/20 backdrop-blur-sm flex items-center justify-center shadow-[0_0_0_9999px_rgba(0,0,0,0.7)]">
                <img id="ar-ghost-image" src="" class="opacity-50 max-w-full max-h-full object-contain pointer-events-none" alt="Alinear imatge">
                <div id="ar-scan-line" class="hidden w-full h-1.5 bg-emerald-400 absolute top-0 shadow-[0_0_15px_rgba(52,211,153,1)] animate-[scan_2s_ease-in-out_infinite]"></div>
            </div>
            <p id="ar-instruction-text" class="text-white text-lg font-bold mb-6 bg-black/70 backdrop-blur px-6 py-3 rounded-full text-center max-w-xs">
                Cercant la imatge d'activació... Mantingueu el pols.
            </p>
            <button onclick="closeARCamera(false)" class="absolute top-6 right-6 w-14 h-14 bg-white/20 backdrop-blur text-white rounded-full flex items-center justify-center"><i class="ph-bold ph-x text-2xl"></i></button>
        </div>
        <div id="ar-content-overlay" class="absolute inset-0 hidden bg-black/40 backdrop-blur-sm z-20"></div>
    </div>

    <script>
        const GLOBAL_CATALOG_URL = "https://script.google.com/macros/s/AKfycbw7_V0bW_fqNXoFf9hPpwBDKEXZMT735ulmCVp9HegUZ69W5_7FvgjQ8FtJG3g6izc/exec";
        const defaultB64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

        function getEmbedUrl(u) { 
            if (!u) return ''; 
            if (u.includes('youtube.com/watch?v=')) return `https://www.youtube.com/embed/${new URL(u).searchParams.get('v')}`; 
            if (u.includes('youtu.be/')) return `https://www.youtube.com/embed/${u.split('youtu.be/')[1]}`; 
            const driveRegex = /(?:https:\/\/)?(?:drive\.google\.com\/)(?:file\/d\/|open\?id=)([\w-]+)/;
            const driveMatch = u.match(driveRegex);
            if (driveMatch && driveMatch[1]) return `https://drive.google.com/file/d/${driveMatch[1]}/preview`;
            return u; 
        }

        // Funció per habilitar el botó de continuació quan acaba un mèdia
        window.enableContinueButton = function() {
            const btn = document.getElementById('media-continue-btn');
            if (btn) {
                btn.style.display = 'block';
                btn.classList.add('fade-in');
            }
        };

        function renderMedia(step) {
            if (!step.mediaType || step.mediaType === 'none' || !step.mediaUrl) return '';
            
            const isDark = step.type === 'web';
            const borderColor = isDark ? 'border-blue-200' : 'border-slate-200';
            const bgColor = isDark ? 'bg-blue-50' : 'bg-slate-50';
            const textColor = isDark ? 'text-blue-500' : 'text-slate-500';

            if (step.mediaType === 'image') {
                return `<img src="${step.mediaUrl}" class="w-full h-auto max-h-64 object-cover rounded-xl mb-6 shadow-sm border ${borderColor}" onerror="this.style.display='none'">`;
            } else if (step.mediaType === 'video') {
                const embedUrl = getEmbedUrl(step.mediaUrl);
                if (embedUrl.includes('youtube') || embedUrl.includes('vimeo') || embedUrl.includes('drive.google')) {
                    return `<div class="video-container mb-6 shadow-sm border ${borderColor} rounded-xl overflow-hidden"><iframe src="${embedUrl}" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`;
                } else {
                    return `<video src="${step.mediaUrl}" controls onended="window.enableContinueButton()" class="w-full max-h-64 rounded-xl mb-6 bg-black shadow-sm border ${borderColor}"></video>`;
                }
            } else if (step.mediaType === 'audio') {
                return `
                    <div class="${bgColor} border ${borderColor} p-4 rounded-xl mb-6 flex flex-col items-center gap-3 w-full shadow-sm">
                        <i class="ph-duotone ph-headphones text-4xl ${textColor}"></i>
                        <audio src="${step.mediaUrl}" controls onended="window.enableContinueButton()" class="w-full outline-none"></audio>
                    </div>
                `;
            } else if (step.mediaType === '3d') {
                return `
                    <div class="mb-6 relative group w-full shadow-sm">
                        <model-viewer src="${step.mediaUrl}" auto-rotate camera-controls shadow-intensity="1" class="w-full h-64 ${bgColor} rounded-xl border ${borderColor}"></model-viewer>
                        <div class="absolute top-2 right-2 bg-slate-900/60 text-white text-xs px-2 py-1 rounded backdrop-blur-sm flex items-center gap-1">
                            <i class="ph ph-hand-swipe-left"></i> Interactiu
                        </div>
                    </div>
                `;
            }
            return '';
        }

        window.draggedSortIndex = null;
        window.dragSortStart = function(e, idx) { window.draggedSortIndex = idx; e.dataTransfer.effectAllowed = 'move'; };
        window.dragSortOver = function(e) { e.preventDefault(); };
        window.dragSortDrop = function(e, targetIdx) {
            e.preventDefault();
            if (window.draggedSortIndex === null || window.draggedSortIndex === targetIdx) return;
            const arr = state.view === 'create' ? state.previewSortOrder : state.playState.currentSortOrder;
            const item = arr.splice(window.draggedSortIndex, 1)[0];
            arr.splice(targetIdx, 0, item);
            window.draggedSortIndex = null;
            renderAll();
        };

        const state = {
            view: 'home', 
            previewStepIndex: 0,
            tours: [],
            draftTour: { id: null, title: '', description: '', steps: [], trackingUrl: '', accessType: 'free' },
            playState: { tourId: null, currentStep: 0, score: 0, maxScore: 0, attempts: {}, completedSteps: {}, feedbackMsg: null, feedbackType: null, geoVerified: false, stepStartTime: null, interactionLogs: [], currentSortOrder: null },
            modalState: { isOpen: false, type: null, editIndex: null, tempQuizOptions: [], tempQuizCorrect: 0, tempValues: {} },
            dialogState: { isOpen: false, message: '', type: 'alert', onConfirm: null, placeholder: '' }
        };

        window.saveStateToSession = function() {
            try {
                const stateToSave = {
                    view: state.view,
                    playState: state.playState,
                    draftTour: state.draftTour,
                    previewStepIndex: state.previewStepIndex,
                    tours: state.tours
                };
                const jsonStr = JSON.stringify(stateToSave);
                sessionStorage.setItem('rutaviva_state', jsonStr);
                localStorage.setItem('rutaviva_state_backup', jsonStr);
            } catch(e) {}
        };

        window.loadStateFromSession = function() {
            try {
                let saved = sessionStorage.getItem('rutaviva_state');
                if (!saved) saved = localStorage.getItem('rutaviva_state_backup');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state.view = parsed.view || 'home';
                    state.playState = parsed.playState || state.playState;
                    state.draftTour = parsed.draftTour || state.draftTour;
                    state.previewStepIndex = parsed.previewStepIndex || 0;
                    if (parsed.tours && Array.isArray(parsed.tours)) {
                        state.tours = parsed.tours;
                    }
                }
            } catch (e) {}
        };

        function loadToursFromCatalog() {
            if (!GLOBAL_CATALOG_URL || window.isAutonomous) return;
            
            fetch(GLOBAL_CATALOG_URL + "?action=getCatalog")
                .then(res => res.text()) 
                .then(text => {
                    if (!text) return;
                    try {
                        const data = JSON.parse(text);
                        if (data.urls && data.urls.length > 0) {
                            let carregades = 0;
                            data.urls.forEach(url => {
                                fetch(url)
                                    .then(r => r.text())
                                    .then(tourText => {
                                        if(!tourText) return;
                                        try {
                                            const tourData = JSON.parse(tourText);
                                            const toursToImport = Array.isArray(tourData) ? tourData : [tourData];
                                            toursToImport.forEach(impTour => {
                                                if(impTour.id && impTour.title && Array.isArray(impTour.steps)) {
                                                    const idx = state.tours.findIndex(t => t.id === impTour.id);
                                                    if (idx >= 0) state.tours[idx] = impTour;
                                                    else state.tours.push(impTour);
                                                    carregades++;
                                                }
                                            });
                                            if(carregades > 0) renderView();
                                        } catch(e) {
                                            console.warn("JSON invàlid al recurs:", url);
                                        }
                                    })
                                    .catch(e => console.warn("Error de xarxa en carregar la ruta des de la URL: " + url));
                            });
                        }
                    } catch(e) {
                        console.warn("La resposta del catàleg no és un format vàlid.");
                    }
                })
                .catch(e => console.warn("Error en connectar amb el catàleg de rutes."));
        }

        function importTours(e) { 
            const f = e.target.files[0]; 
            const reader = new FileReader(); 
            reader.onload = ev => { 
                try { 
                    const imported = JSON.parse(ev.target.result); 
                    let firstId = null;
                    imported.forEach(t => {
                        if (!firstId) firstId = t.id;
                        const idx = state.tours.findIndex(existing => existing.id === t.id);
                        if (idx >= 0) state.tours[idx] = t;
                        else state.tours.push(t);
                    });
                    if (firstId) editTour(firstId);
                    else navigateTo('home');
                } catch(err) { 
                    showDialog("Error JSON"); 
                } 
            }; 
            reader.readAsText(f); 
        }

        window.importFolder = function(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;
            
            let loadedCount = 0;
            let processedFiles = 0;
            const totalFiles = files.length;
            
            Array.from(files).forEach(file => {
                if (file.name.toLowerCase().startsWith('rutaviva_') && file.name.toLowerCase().endsWith('.json')) {
                    const reader = new FileReader();
                    reader.onload = ev => {
                        try {
                            const imported = JSON.parse(ev.target.result);
                            if (Array.isArray(imported)) {
                                imported.forEach(impTour => {
                                    if(impTour.id && impTour.title && Array.isArray(impTour.steps)) {
                                        const idx = state.tours.findIndex(t => t.id === impTour.id);
                                        if (idx >= 0) state.tours[idx] = impTour;
                                        else state.tours.push(impTour);
                                        loadedCount++;
                                    }
                                });
                            }
                        } catch(err) {}
                        checkComplete();
                    };
                    reader.readAsText(file);
                } else {
                    checkComplete();
                }
                
                function checkComplete() {
                    processedFiles++;
                    if (processedFiles === totalFiles) {
                        showDialog(`S'ha completat la cerca a la carpeta. S'han carregat ${loadedCount} ruta/es correctament.`);
                        renderView();
                    }
                }
            });
            e.target.value = '';
        };

        let mapInstance = null;
        let mapMarker = null;
        let mapCircle = null;
        let currentVideoStream = null; 
        let arScanActive = false;

        window.onload = () => {
            if (window.isAutonomous && window.AUTONOMOUS_TOUR) {
                state.tours = [window.AUTONOMOUS_TOUR];
                if (window.AUTONOMOUS_TOUR.accessType === 'restricted') {
                    state.view = 'home';
                    renderAll();
                    checkTourAccess(window.AUTONOMOUS_TOUR.id);
                } else {
                    startTour(window.AUTONOMOUS_TOUR.id);
                }
                return;
            }
            window.loadStateFromSession();
            renderAll();
            loadToursFromCatalog();
        };

        function renderAll() { 
            renderView(); 
            renderModal(); 
            renderDialogUI(); 
            window.saveStateToSession(); 
        }

        function renderView() {
            const appContainer = document.getElementById('app');
            appContainer.innerHTML = `
                <header class="bg-emerald-600 text-white shadow-md sticky top-0 z-10">
                    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                        <div class="flex items-center gap-2 cursor-pointer" onclick="navigateTo('home')">
                            <i class="ph-fill ph-map-trifold text-3xl"></i>
                            <h1 class="text-xl font-bold tracking-wide">RutaViva 2.7</h1>
                        </div>
                        <nav>
                            <button onclick="navigateTo('home')" class="p-2 hover:bg-emerald-700 rounded-full transition" title="Inici">
                                <i class="ph ph-house text-2xl"></i>
                            </button>
                        </nav>
                    </div>
                </header>
            `;

            const mainContent = document.createElement('main');
            mainContent.className = 'flex-grow max-w-6xl w-full mx-auto p-4 flex flex-col fade-in relative z-0';
            
            switch(state.view) {
                case 'home': mainContent.innerHTML = renderHome(); break;
                case 'create': mainContent.innerHTML = renderCreate(); break;
                case 'list': mainContent.innerHTML = renderList(); break;
                case 'play': mainContent.innerHTML = renderPlay(); break;
                case 'summary': mainContent.innerHTML = renderSummary(); break;
                default: mainContent.innerHTML = renderHome();
            }
            
            appContainer.appendChild(mainContent);

            if (state.view === 'play') {
                const tour = state.tours.find(t => t.id === state.playState.tourId);
                const step = tour?.steps ? tour.steps[state.playState.currentStep] : null;
                if (step && (step.hasGeo || step.type === 'find_spot') && !state.playState.geoVerified && !state.playState.feedbackMsg) {
                    setTimeout(() => initMapForPlay(step.targetLat, step.targetLng, step.targetRadius || 30), 200);
                }
            }
        }

        // Funció afegida per sincronitzar i no perdre valors quan s'afegeix/treu un element de llista
        window.syncModalState = function() {
            if (!state.modalState.tempValues) state.modalState.tempValues = {};
            const container = document.getElementById('modal-container');
            if (!container) return;
            
            // Sincronitza l'opció correcta per evitar col·lisions
            const correctRadio = container.querySelector('input[name="correctOpt"]:checked');
            if (correctRadio) state.modalState.tempQuizCorrect = parseInt(correctRadio.value);

            const inputs = container.querySelectorAll('input, textarea, select');
            inputs.forEach(el => {
                // Ignorem els elements dinàmics de la llista (opt0, opt1...) ja que els gestionem a sota
                if (el.id && !el.id.startsWith('opt') && el.name !== 'correctOpt') {
                    if (el.type === 'checkbox' || el.type === 'radio') {
                        state.modalState.tempValues[el.id] = el.checked;
                    } else {
                        state.modalState.tempValues[el.id] = el.value;
                    }
                }
            });
            
            const list = document.getElementById('quizOptionsList');
            if (list) {
                const opts = list.querySelectorAll('input[type="text"]');
                state.modalState.tempQuizOptions = Array.from(opts).map(o => o.value);
            }
        };

        function renderModal() {
            const container = document.getElementById('modal-container');
            if (state.view === 'create' && state.modalState.isOpen) {
                container.innerHTML = renderDynamicModal();
                const geoPanelEl = document.getElementById('geoControlPanel');
                if (state.modalState.type === 'find_spot' || (geoPanelEl && geoPanelEl.style.display !== 'none')) {
                    setTimeout(initMapForCreation, 200);
                }
                setTimeout(() => {
                    if (state.modalState.tempValues) {
                        Object.keys(state.modalState.tempValues).forEach(key => {
                            const el = document.getElementById(key);
                            if (el) {
                                if (el.type === 'checkbox' || el.type === 'radio') el.checked = state.modalState.tempValues[key];
                                else el.value = state.modalState.tempValues[key];
                                if (el.id === 'modalMediaSelect') el.dispatchEvent(new Event('change'));
                            }
                        });
                    }
                }, 10);
            } else { container.innerHTML = ''; }
        }

        function renderDialogUI() {
            const container = document.getElementById('dialog-container');
            if (state.dialogState.isOpen) {
                const isConfirm = state.dialogState.type === 'confirm';
                const isPrompt = state.dialogState.type === 'prompt';
                const showCancel = isConfirm || isPrompt;
                
                container.innerHTML = `
                    <div class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center p-4 z-[200]">
                        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center">
                            <div class="w-20 h-20 ${showCancel ? 'bg-orange-100 text-orange-500' : 'bg-blue-100 text-blue-500'} rounded-full flex items-center justify-center mx-auto mb-6">
                                <i class="ph-fill ${isConfirm ? 'ph-warning-circle' : (isPrompt ? 'ph-lock-key' : 'ph-info')} text-4xl"></i>
                            </div>
                            <p class="text-xl font-bold text-slate-800 mb-6">${state.dialogState.message}</p>
                            ${isPrompt ? `<input type="text" id="dialogPromptInput" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-xl mb-6 text-center text-lg tracking-widest font-mono focus:border-emerald-500 focus:outline-none" placeholder="${state.dialogState.placeholder || ''}">` : ''}
                            <div class="flex gap-3 justify-center" id="dialogButtonsContainer">
                                ${showCancel ? `<button onclick="closeDialog(false)" class="px-5 py-3 text-slate-600 font-semibold hover:bg-slate-100 rounded-xl transition">Cancel·lar</button>` : ''}
                                <button onclick="closeDialog(true)" class="px-6 py-3 ${showCancel ? 'bg-orange-500 hover:bg-orange-600' : 'bg-blue-500 hover:bg-blue-600'} text-white rounded-xl font-bold transition">${isPrompt ? 'Validar' : 'D\'acord'}</button>
                            </div>
                        </div>
                    </div>
                `;
            } else { container.innerHTML = ''; }
        }

        function showDialog(message, type = 'alert', onConfirm = null, placeholder = '') { state.dialogState = { isOpen: true, message, type, onConfirm, placeholder }; renderDialogUI(); }
        
        function closeDialog(confirmed) { 
            const onConfirm = state.dialogState.onConfirm; 
            const val = document.getElementById('dialogPromptInput') ? document.getElementById('dialogPromptInput').value.trim() : null;
            state.dialogState.isOpen = false; 
            renderDialogUI(); 
            if (confirmed && onConfirm) onConfirm(val); 
        }

        function renderHome() {
            let htmlList = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto w-full mb-8">`;
            const visibleTours = state.tours.filter(t => !t.id.startsWith('temp-'));
            if (visibleTours.length === 0) {
                htmlList += `<div class="col-span-1 md:col-span-2 text-center py-10 bg-white rounded-2xl shadow-sm border border-slate-200 text-slate-500">No hi ha cap ruta guardada actualment a la memòria. Carregueu una carpeta o creeu-ne una de nova.</div>`;
            } else {
                visibleTours.forEach(tour => {
                    htmlList += `
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full text-left">
                            <h3 class="text-xl font-bold mb-2">${tour.title}</h3>
                            <p class="text-sm text-slate-500 mb-4 flex-grow line-clamp-2">${tour.description || 'Sense descripció.'}</p>
                            <div class="flex gap-2 mt-4">
                                ${window.isAutonomous ? '' : `<button onclick="editTour('${tour.id}')" class="p-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg transition" title="Editar"><i class="ph-bold ph-pencil-simple"></i></button>`}
                                <button onclick="checkTourAccess('${tour.id}')" class="flex-grow py-3 bg-slate-900 hover:bg-slate-800 text-white rounded-lg font-bold transition">Iniciar Experiència</button>
                            </div>
                        </div>
                    `;
                });
            }
            htmlList += `</div>`;

            let creatorButtons = '';
            if (!window.isAutonomous) {
                creatorButtons = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl mt-auto pt-8 border-t border-slate-200">
                        <button onclick="startCreation()" class="flex flex-col items-center justify-center p-6 bg-white rounded-2xl shadow-sm border border-slate-200 hover:shadow-md hover:border-blue-300 hover:bg-blue-50 transition group">
                            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mb-3 mx-auto group-hover:scale-110 transition"><i class="ph-fill ph-plus text-2xl text-blue-600"></i></div>
                            <h3 class="text-lg font-bold text-slate-800">Crear Ruta Nova</h3>
                        </button>

                        <div class="flex flex-col items-center justify-center p-6 bg-white rounded-2xl shadow-sm border border-slate-200 hover:shadow-md hover:border-emerald-300 hover:bg-emerald-50 transition group relative overflow-hidden">
                            <input type="file" id="importSingleFileInputHome" accept=".json" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="importTours(event)">

        function setPreviewStep(idx, e) {
            if (e && (e.target.closest('button') || e.target.tagName.toLowerCase() === 'button')) return;
            
            const listContainer = document.querySelector('.overflow-y-auto.pr-2.no-scrollbar');
            const scrollPos = listContainer ? listContainer.scrollTop : 0;
            const windowScroll = window.scrollY;

            state.previewStepIndex = idx;
            renderView();
            
            const newListContainer = document.querySelector('.overflow-y-auto.pr-2.no-scrollbar');
            if (newListContainer) newListContainer.scrollTop = scrollPos;
            window.scrollTo(0, windowScroll);
        }

        function handleTriggerUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > 600) { h = Math.round(h * 600 / w); w = 600; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    document.getElementById('modalInputTriggerB64').value = canvas.toDataURL('image/jpeg', 0.8);
                    
                    const tCanvas = document.createElement('canvas');
                    tCanvas.width = 64; tCanvas.height = 64;
                    tCanvas.getContext('2d').drawImage(img, 0, 0, 64, 64);
                    document.getElementById('modalInputTriggerTemplate').value = tCanvas.toDataURL('image/jpeg', 0.8);
                    
                    const preview = document.getElementById('triggerPreview');
                    preview.src = canvas.toDataURL('image/jpeg', 0.8);
                    preview.style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

                        <div class="flex flex-col gap-3">

                        </div>

        function verifyGeoPosition() {
            const btn = document.getElementById('verifyBtn');
            btn.innerHTML = `<i class="ph ph-spinner animate-spin"></i> Verificant...`;
            btn.disabled = true;

            const tour = state.tours.find(t => t.id === state.playState.tourId);
            const step = tour.steps[state.playState.currentStep];

            if (!navigator.geolocation) {
                showDialog("La geolocalització no és compatible amb aquest dispositiu.");
                btn.innerHTML = `<i class="ph-bold ph-crosshair"></i> Validar Ubicació`;
                btn.disabled = false;
                return;
            }

            navigator.geolocation.getCurrentPosition(pos => {
                const safeLat = (step.targetLat === undefined || isNaN(step.targetLat) || step.targetLat === null) ? 41.3851 : step.targetLat;
                const safeLng = (step.targetLng === undefined || isNaN(step.targetLng) || step.targetLng === null) ? 2.1734 : step.targetLng;
                
                const dist = getDistanceFromLatLonInM(pos.coords.latitude, pos.coords.longitude, safeLat, safeLng);
                const radius = (step.targetRadius === undefined || isNaN(step.targetRadius)) ? 30 : step.targetRadius;
                
                if (dist <= radius) {
                    state.playState.geoVerified = true;
                    renderView();
                } else {
                    const remaining = Math.round(dist - radius);
                    showDialog(`Encara sou lluny. Us falten uns ${remaining > 0 ? remaining : Math.round(dist)} metres per arribar a la zona de validació.`);
                    btn.innerHTML = `<i class="ph-bold ph-crosshair"></i> Validar Ubicació`;
                    btn.disabled = false;
                }
            }, err => {
                showDialog("No s'ha pogut obtenir la vostra ubicació. Reviseu els permisos.");
                btn.innerHTML = `<i class="ph-bold ph-crosshair"></i> Validar Ubicació`;
                btn.disabled = false;
            }, { enableHighAccuracy: true });
        }

        function getDistanceFromLatLonInM(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

            }

                    urlVal = 'https://' + urlVal;
                }
                stepData.url = urlVal;
                let s1 = parseInt(document.getElementById('modalScore1')?.value);
                stepData.scoreFirstTry = isNaN(s1) ? 10 : s1;
            } else if (type === 'info') {
                stepData.content = v1;
            } else if (type === 'quiz') {
                stepData.question = v1;
                stepData.options = state.modalState.tempQuizOptions.map((_,i)=>document.getElementById('opt'+i).value.trim());
                stepData.correct = parseInt(document.querySelector('input[name="correctOpt"]:checked')?.value || 0);
                stepData.scoreFirstTry = parseInt(document.getElementById('modalScore1').value);
                stepData.scoreNextTries = parseInt(document.getElementById('modalScore2').value);
            } else if (type === 'question') {
                stepData.question = v1;
                stepData.validAnswers = document.getElementById('modalInput2').value.split('\n').map(a=>a.trim().toLowerCase());
                stepData.scoreFirstTry = parseInt(document.getElementById('modalScore1').value);
                stepData.scoreNextTries = parseInt(document.getElementById('modalScore2').value);
            } else if (type === 'sort') {
                stepData.instruction = v1;
                stepData.correctOrder = state.modalState.tempQuizOptions.map((_,i)=>document.getElementById('opt'+i).value.trim());
                stepData.scoreFirstTry = parseInt(document.getElementById('modalScore1').value);
                stepData.scoreNextTries = parseInt(document.getElementById('modalScore2').value);

                stepData.locationHint = v1;

        function finalizeSaveTour(downloadAsJson = false, keepEditing = false) {
            const titleEl = document.getElementById('modalTourTitle');
            const descEl = document.getElementById('modalTourDesc');
            const trackEl = document.getElementById('modalTourTracking');
            const accessEl = document.getElementById('modalTourAccess');
            
            if (titleEl) state.draftTour.title = titleEl.value.trim();
            if (descEl) state.draftTour.description = descEl.value.trim();
            if (trackEl) state.draftTour.trackingUrl = trackEl.value.trim();
            if (accessEl) state.draftTour.accessType = accessEl.value;
            
            if (!state.draftTour.title) {
                return showDialog("Cal afegir un títol a la ruta abans de desar-la.");
            }
            if (state.draftTour.steps.length === 0) {
                return showDialog("Cal afegir almenys un contingut o etapa a la ruta.");
            }
            if (state.draftTour.accessType === 'restricted' && !state.draftTour.trackingUrl) {
                return showDialog("Heu marcat la ruta com a restringida. Heu d'afegir la URL de Google Sheets perquè es puguin validar els codis d'accés correctament.");
            }
            
            let savedTour;
            if (state.draftTour.id && !state.draftTour.id.startsWith('temp-')) {
                const index = state.tours.findIndex(t => t.id === state.draftTour.id);
                if (index !== -1) {
                    state.tours[index] = { ...state.draftTour };
                    savedTour = state.tours[index];
                } else {
                    savedTour = { ...state.draftTour };
                    state.tours.push(savedTour);
                }
            } else { 
                state.draftTour.id = 'r-' + Date.now(); 
                savedTour = { ...state.draftTour };
                state.tours.push(savedTour); 
            }

            if (downloadAsJson && savedTour) {
                triggerDownloadJSON(savedTour);
            }
            
            closeModal();
            
            if (keepEditing) {
                renderView();
                return; 
            }

            navigateTo('home');
        }

        function triggerDownloadJSON(tourObj) {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify([tourObj], null, 2));

            dl.setAttribute("download", `rutaviva_${(tourObj.title || 'ruta').replace(/[^a-z0-9]/gi, '_').toLowerCase()}.json`);
