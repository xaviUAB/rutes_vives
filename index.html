<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RutaViva - Experiències Gamificades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; color: #0f172a; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 0.5rem; }
        .video-container iframe, .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        model-viewer { width: 100%; height: 300px; background-color: #f1f5f9; border-radius: 0.75rem; border: 1px solid #e2e8f0; }
        .pulse-red { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        /* Simulador Mòbil */
        .mobile-simulator {
            width: 320px;
            height: 568px;
            border-radius: 2.5rem;
            border: 12px solid #0f172a;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            background: #f8fafc;
            overflow-y: auto;
            position: relative;
        }
        .mobile-simulator::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="app" class="min-h-screen flex flex-col relative z-0"></div>
    <div id="modal-container" class="relative z-[50]"></div>
    <div id="dialog-container" class="relative z-[200]"></div>

    <div id="ar-fullscreen-container" class="fixed inset-0 z-[100] hidden bg-black flex flex-col">
        <video id="ar-video-feed" class="absolute inset-0 w-full h-full object-cover" autoplay playsinline></video>
        <div id="ar-scan-ui" class="absolute inset-0 flex flex-col items-center justify-center z-10">
            <div id="ar-ghost-container" class="relative w-72 h-72 border-4 border-dashed border-white/70 rounded-2xl overflow-hidden mb-6 bg-black/20 backdrop-blur-sm flex items-center justify-center shadow-[0_0_0_9999px_rgba(0,0,0,0.7)]">
                <img id="ar-ghost-image" src="" class="opacity-50 max-w-full max-h-full object-contain pointer-events-none" alt="Alinear imatge">
                <div id="ar-scan-line" class="hidden w-full h-1.5 bg-emerald-400 absolute top-0 shadow-[0_0_15px_rgba(52,211,153,1)] animate-[scan_2s_ease-in-out_infinite]"></div>
            </div>
            <p id="ar-instruction-text" class="text-white text-lg font-bold mb-6 bg-black/70 backdrop-blur px-6 py-3 rounded-full text-center max-w-xs">
                Cercant la imatge d'activació... Mantingueu el pols.
            </p>
            <button onclick="closeARCamera(false)" class="absolute top-6 right-6 w-14 h-14 bg-white/20 backdrop-blur text-white rounded-full flex items-center justify-center"><i class="ph-bold ph-x text-2xl"></i></button>
        </div>
        <div id="ar-content-overlay" class="absolute inset-0 hidden bg-black/40 backdrop-blur-sm z-20"></div>
    </div>

    <script>
        const defaultB64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

        const state = {
            view: 'home', 
            previewStepIndex: 0,
            tours: [
                {
                    id: 'demo-1',
                    title: 'Aventura Completa: Explorant l\'Entorn',
                    description: 'Ruta d\'exemple que conté totes les funcionalitats.',
                    trackingUrl: '',
                    steps: [
                        { type: 'stage', title: 'Benvinguda Multimèdia' },
                        { type: 'info', content: 'Escolteu aquesta breu introducció abans de començar.', mediaType: 'audio', mediaUrl: 'https://actions.google.com/sounds/v1/nature/bird_song.ogg' },
                        { type: 'sort', instruction: 'Ordeneu els següents elements del més antic al més modern:', correctOrder: ['Primer element', 'Segon element', 'Tercer element'] },
                        { type: 'find_spot', locationHint: 'Aneu fins a la zona marcada al mapa per avançar.', targetLat: 41.3851, targetLng: 2.1734 },
                        { type: 'quiz', question: 'Què destaqueu de l\'entorn?', options: ['Arquitectura', 'Natura', 'Silenci', 'Urbanisme'], correct: 0 },
                        { type: 'question', question: 'Quin és el color del cel?', validAnswers: ['blau', 'celeste'] },
                        { type: 'ar_exp', instruction: 'Enfoqueu amb la càmera per descobrir el model 3D.', triggerImageB64: defaultB64, triggerTemplateB64: defaultB64, arType: '3d', arContent: 'https://modelviewer.dev/shared-assets/models/Astronaut.glb' },
                        { type: 'mission', instruction: 'Quin ús responsable faríeu d\'aquest espai? Escriviu-ho.' }
                    ]
                }
            ],
            draftTour: { id: null, title: '', description: '', steps: [], trackingUrl: '' },
            playState: { tourId: null, currentStep: 0, score: 0, maxScore: 0, attempts: {}, feedbackMsg: null, feedbackType: null, geoVerified: false, stepStartTime: null, interactionLogs: [], currentSortOrder: null },
            modalState: { isOpen: false, type: null, editIndex: null, tempQuizOptions: [], tempQuizCorrect: 0 },
            dialogState: { isOpen: false, message: '', type: 'alert', onConfirm: null }
        };

        let mapInstance = null;
        let mapMarker = null;
        let mapCircle = null;
        let currentVideoStream = null; 
        let arScanActive = false;

        window.onload = () => renderAll();

        function renderAll() { renderView(); renderModal(); renderDialogUI(); }

        function renderView() {
            const appContainer = document.getElementById('app');
            appContainer.innerHTML = `
                <header class="bg-emerald-600 text-white shadow-md sticky top-0 z-10">
                    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                        <div class="flex items-center gap-2 cursor-pointer" onclick="navigateTo('home')">
                            <i class="ph-fill ph-map-trifold text-3xl"></i>
                            <h1 class="text-xl font-bold tracking-wide">RutaViva</h1>
                        </div>
                        <nav>
                            <button onclick="navigateTo('home')" class="p-2 hover:bg-emerald-700 rounded-full transition" title="Inici">
                                <i class="ph ph-house text-2xl"></i>
                            </button>
                        </nav>
                    </div>
                </header>
            `;

            const mainContent = document.createElement('main');
            mainContent.className = 'flex-grow max-w-6xl w-full mx-auto p-4 flex flex-col fade-in relative z-0';
            
            switch(state.view) {
                case 'home': mainContent.innerHTML = renderHome(); break;
                case 'create': mainContent.innerHTML = renderCreate(); break;
                case 'list': mainContent.innerHTML = renderList(); break;
                case 'play': mainContent.innerHTML = renderPlay(); break;
                case 'summary': mainContent.innerHTML = renderSummary(); break;
                default: mainContent.innerHTML = renderHome();
            }
            
            appContainer.appendChild(mainContent);

            if (state.view === 'play') {
                const tour = state.tours.find(t => t.id === state.playState.tourId);
                const step = tour.steps[state.playState.currentStep];
                if (step && (step.hasGeo || step.type === 'find_spot') && !state.playState.geoVerified && !state.playState.feedbackMsg) {
                    setTimeout(() => initMapForPlay(step.targetLat, step.targetLng, step.targetRadius || 30), 200);
                }
            }
        }

        function renderModal() {
            const container = document.getElementById('modal-container');
            if (state.view === 'create' && state.modalState.isOpen) {
                container.innerHTML = renderDynamicModal();
                if (state.modalState.type === 'find_spot' || (document.getElementById('geoControlPanel') && document.getElementById('geoControlPanel').style.display !== 'none')) {
                    setTimeout(initMapForCreation, 200);
                }
            } else { container.innerHTML = ''; }
        }

        function renderDialogUI() {
            const container = document.getElementById('dialog-container');
            if (state.dialogState.isOpen) {
                const isConfirm = state.dialogState.type === 'confirm';
                container.innerHTML = `
                    <div class="fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center p-4 z-[200]">
                        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center">
                            <div class="w-20 h-20 ${isConfirm ? 'bg-orange-100 text-orange-500' : 'bg-blue-100 text-blue-500'} rounded-full flex items-center justify-center mx-auto mb-6">
                                <i class="ph-fill ${isConfirm ? 'ph-warning-circle' : 'ph-info'} text-4xl"></i>
                            </div>
                            <p class="text-xl font-bold text-slate-800 mb-6">${state.dialogState.message}</p>
                            <div class="flex gap-3 justify-center">
                                ${isConfirm ? `<button onclick="closeDialog(false)" class="px-5 py-3 text-slate-600 font-semibold hover:bg-slate-100 rounded-xl transition">Cancel·lar</button>` : ''}
                                <button onclick="closeDialog(true)" class="px-6 py-3 ${isConfirm ? 'bg-orange-500 hover:bg-orange-600' : 'bg-blue-500 hover:bg-blue-600'} text-white rounded-xl font-bold transition">D'acord</button>
                            </div>
                        </div>
                    </div>
                `;
            } else { container.innerHTML = ''; }
        }

        function showDialog(message, type = 'alert', onConfirm = null) { state.dialogState = { isOpen: true, message, type, onConfirm }; renderDialogUI(); }
        function closeDialog(confirmed) { const onConfirm = state.dialogState.onConfirm; state.dialogState.isOpen = false; renderDialogUI(); if (confirmed && onConfirm) onConfirm(); }

        function renderHome() {
            return `
                <div class="flex flex-col items-center justify-center flex-grow text-center py-12">
                    <i class="ph-duotone ph-compass text-8xl text-emerald-500 mb-6"></i>
                    <h2 class="text-3xl font-extrabold text-slate-800 mb-4">Experiències Interactives</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl mb-12">
                        <button onclick="navigateTo('list')" class="p-8 bg-white rounded-3xl border border-slate-200 hover:bg-emerald-50 transition group">
                            <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mb-4 mx-auto group-hover:scale-110 transition"><i class="ph-fill ph-play text-3xl text-emerald-600"></i></div>
                            <h3 class="text-xl font-bold text-slate-800">Participar</h3>
                        </button>
                        <button onclick="startCreation()" class="p-8 bg-white rounded-3xl border border-slate-200 hover:bg-blue-50 transition group">
                            <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-4 mx-auto group-hover:scale-110 transition"><i class="ph-fill ph-plus text-3xl text-blue-600"></i></div>
                            <h3 class="text-xl font-bold text-slate-800">Crear Ruta</h3>
                        </button>
                    </div>
                    <input type="file" id="importFileInputHome" accept=".json" class="hidden" onchange="importTours(event)">
                    <button onclick="document.getElementById('importFileInputHome').click()" class="px-8 py-4 bg-white border-2 text-slate-700 font-bold rounded-2xl hover:bg-slate-50 transition shadow-sm w-full md:w-auto flex items-center justify-center gap-2 mx-auto">
                        <i class="ph-bold ph-upload-simple"></i> Carregar rutes JSON
                    </button>
                </div>
            `;
        }

        function renderList() {
            let html = `<div class="mb-6 flex items-center justify-between max-w-4xl mx-auto"><h2 class="text-2xl font-bold text-slate-800">Rutes Disponibles</h2><button onclick="navigateTo('home')" class="p-2 bg-slate-200 rounded-full"><i class="ph ph-arrow-left"></i></button></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto">`;
            if (state.tours.length === 0) {
                html += `<div class="col-span-2 text-center py-12 bg-white rounded-xl shadow-sm border border-slate-200 text-slate-500">No hi ha cap ruta guardada actualment.</div>`;
            } else {
                state.tours.forEach(tour => {
                    html += `
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full">
                            <h3 class="text-xl font-bold mb-2">${tour.title}</h3>
                            <p class="text-sm text-slate-500 mb-4 flex-grow line-clamp-2">${tour.description || 'Sense descripció.'}</p>
                            <div class="flex gap-2 mt-4">
                                <button onclick="editTour('${tour.id}')" class="p-3 bg-slate-100 hover:bg-slate-200 rounded-lg transition" title="Editar"><i class="ph-bold ph-pencil-simple"></i></button>
                                <button onclick="startTour('${tour.id}')" class="flex-grow py-3 bg-slate-900 hover:bg-slate-800 text-white rounded-lg font-bold transition">Iniciar</button>
                            </div>
                        </div>
                    `;
                });
            }
            return html + `</div>`;
        }

        // Simula la vista prèvia dins de l'editor
        function renderStepPreviewSimulator() {
            if (state.draftTour.steps.length === 0) return '<div class="p-8 text-center text-slate-400 mt-20">Seleccioneu una etapa per previsualitzar-la aquí</div>';
            
            const step = state.draftTour.steps[state.previewStepIndex];
            if (!step) return '';

            let mediaHtml = renderMedia(step);
            let contentHtml = '';
            
            if (step.type === 'stage') {
                contentHtml = `<div class="bg-slate-800 text-white p-6 rounded-2xl text-center border-4 border-slate-700 mb-4">${mediaHtml}<h2 class="text-2xl font-black uppercase">${step.title}</h2></div><button class="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold">Començar etapa</button>`;
            } else if (step.type === 'info') {
                contentHtml = `<div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-4">${mediaHtml}<p class="text-slate-700 text-sm">${step.content}</p></div><button class="w-full py-3 bg-emerald-600 text-white rounded-xl font-bold">Següent</button>`;
            } else if (step.type === 'quiz') {
                contentHtml = `<div class="bg-white p-5 rounded-2xl border border-slate-200 mb-4"><h3 class="font-bold text-sm mb-3">${step.question}</h3>${mediaHtml}<div class="space-y-2">${step.options.map(o=>`<div class="p-3 border-2 rounded-xl text-slate-700 text-sm font-medium">${o}</div>`).join('')}</div></div>`;
            } else if (step.type === 'question') {
                contentHtml = `<div class="bg-white p-5 rounded-2xl border border-slate-200 mb-4"><h3 class="font-bold text-sm mb-3">${step.question}</h3>${mediaHtml}<input type="text" class="w-full p-3 bg-slate-50 border-2 rounded-xl mb-4 text-sm" placeholder="Escriu aquí..."><button class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold">Enviar</button></div>`;
            } else if (step.type === 'mission') {
                contentHtml = `<div class="bg-white p-5 rounded-2xl border border-slate-200 mb-4"><h2 class="font-bold text-sm mb-2">Missió</h2><p class="mb-4 text-xs">${step.instruction}</p>${mediaHtml}<textarea class="w-full p-3 bg-slate-50 border-2 rounded-xl mb-4" rows="2"></textarea><button class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold">Completar</button></div>`;
            } else if (step.type === 'sort') {
                contentHtml = `<div class="bg-white p-5 rounded-2xl border border-slate-200 mb-4"><h3 class="font-bold text-sm mb-3">${step.instruction}</h3>${mediaHtml}<div class="space-y-2">${step.correctOrder.map((o,i)=>`<div class="p-3 border-2 rounded-xl text-slate-700 text-xs font-medium flex gap-2"><span class="font-bold text-slate-400">${i+1}.</span> ${o}</div>`).join('')}</div><button class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold mt-4">Comprovar Ordre</button></div>`;
            } else if (step.type === 'ar_exp') {
                 contentHtml = `<div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 text-center"><div class="w-12 h-12 bg-teal-100 text-teal-600 rounded-full flex items-center justify-center mx-auto mb-2"><i class="ph-fill ph-cube text-2xl"></i></div><span class="text-[10px] font-bold text-teal-500 uppercase block mb-2">Realitat Augmentada</span><p class="text-xs font-semibold mb-4">${step.instruction}</p><img src="${step.triggerImageB64 || defaultB64}" class="h-20 mx-auto mb-4 rounded-lg border-2 border-slate-100 object-cover"><button class="w-full py-3 bg-teal-600 text-white rounded-xl font-bold text-sm">Obrir Escàner</button></div>`;
            } else if (step.type === 'find_spot') {
                 contentHtml = `<div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 text-center"><div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-2"><i class="ph-fill ph-map-pin text-2xl"></i></div><p class="text-xs font-semibold mb-4">${step.locationHint}</p><div class="h-20 bg-slate-200 rounded-xl mb-4"></div><button class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold text-sm">Validar Ubicació</button></div>`;
            } else if (step.type === 'scan_code') {
                 contentHtml = `<div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 text-center"><div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-2"><i class="ph-fill ph-qr-code text-2xl"></i></div><p class="text-xs font-semibold mb-4">${step.instruction}</p><input type="text" class="w-full p-3 bg-slate-50 border-2 rounded-xl mb-4" placeholder="CODI..."><button class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold text-sm">Validar</button></div>`;
            } else if (step.type === 'survey') {
                 contentHtml = `<div class="bg-white p-5 rounded-2xl border border-slate-200 mb-4"><h3 class="font-bold text-sm mb-3">${step.question}</h3>${mediaHtml}<div class="space-y-2">${step.options.filter(o=>o).map(o=>`<div class="p-3 border-2 rounded-xl text-slate-700 text-sm font-medium">${o}</div>`).join('')}</div></div>`;
            }

            return `
                <div class="p-4 pt-6 min-h-full flex flex-col pointer-events-none">
                    <div class="mb-4">
                        <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase mb-1"><span>${state.draftTour.title || 'Ruta sense títol'}</span><span>Pas ${state.previewStepIndex+1}/${state.draftTour.steps.length}</span></div>
                        <div class="w-full bg-slate-200 rounded-full h-1"><div class="bg-emerald-500 h-1 rounded-full" style="width: ${((state.previewStepIndex)/state.draftTour.steps.length)*100}%"></div></div>
                    </div>
                    ${contentHtml}
                </div>
            `;
        }

        function renderCreate() {
            let stepsHtml = state.draftTour.steps.length === 0 ? `<div class="text-center py-8 text-slate-400 bg-white rounded-xl border border-dashed border-slate-300">Utilitzeu els botons inferiors per afegir contingut.</div>` : 
                state.draftTour.steps.map((step, index) => {
                    const visuals = getVisualsForStepType(step.type);
                    const isSelected = state.previewStepIndex === index;

                    return `
                        <div onclick="setPreviewStep(${index}, event)" class="cursor-pointer bg-white p-4 rounded-xl border-2 ${isSelected ? 'border-emerald-400' : 'border-slate-200'} mb-3 flex gap-4 items-start shadow-sm transition hover:shadow-md">
                            <div class="${visuals.bgClass} ${visuals.textClass} p-3 rounded-lg shrink-0"><i class="${visuals.iconClass} text-xl"></i></div>
                            <div class="flex-grow">
                                <div class="flex items-center gap-2 mb-1 flex-wrap">
                                    <span class="text-[11px] font-bold text-slate-600 uppercase flex items-center gap-1 bg-slate-100 px-2 py-0.5 rounded">
                                        <i class="${visuals.iconClass}"></i> ${visuals.label}
                                    </span>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase">Pas ${index + 1}</span>
                                    ${step.hasGeo ? `<span class="bg-red-100 text-red-600 text-[9px] px-1.5 py-0.5 rounded font-bold"><i class="ph-bold ph-map-pin"></i> GEOBLOCADA</span>` : ''}
                                </div>
                                <p class="font-bold text-slate-800 line-clamp-2 mt-2">${step.title || step.question || step.instruction || step.locationHint || 'Sense contingut principal'}</p>
                            </div>
                            <div class="flex flex-col gap-1 items-center shrink-0">
                                <button onclick="openModal('${step.type}', ${index})" class="text-blue-500 hover:bg-blue-50 p-1 rounded transition" title="Editar"><i class="ph-bold ph-pencil-simple"></i></button>
                                <button onclick="moveStep(${index}, -1)" class="text-slate-400 hover:text-slate-700 hover:bg-slate-100 p-1 rounded transition" ${index === 0 ? 'disabled style="opacity:0.3; cursor:not-allowed;"' : ''} title="Pujar"><i class="ph-bold ph-caret-up"></i></button>
                                <button onclick="moveStep(${index}, 1)" class="text-slate-400 hover:text-slate-700 hover:bg-slate-100 p-1 rounded transition" ${index === state.draftTour.steps.length - 1 ? 'disabled style="opacity:0.3; cursor:not-allowed;"' : ''} title="Baixar"><i class="ph-bold ph-caret-down"></i></button>
                                <button onclick="removeStep(${index})" class="text-red-300 hover:text-red-500 hover:bg-red-50 p-1 rounded transition" title="Eliminar"><i class="ph-bold ph-trash"></i></button>
                            </div>
                        </div>
                    `;
                }).join('');

            return `
                <div class="w-full flex flex-col lg:flex-row gap-6">
                    <div class="flex-grow max-w-3xl w-full mx-auto">
                        <div class="mb-6 flex justify-between items-center">
                            <h2 class="text-2xl font-bold text-slate-800">Editor de Ruta</h2>
                            <button onclick="openModal('save_tour')" class="px-5 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-md transition text-sm">Desar Ruta</button>
                        </div>
                        <div class="bg-slate-100 p-6 rounded-2xl border border-slate-200 mb-6">
                            <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="ph-fill ph-map-pin-line text-emerald-600"></i> Estructura Temporal</h3>
                            <div class="mb-6 max-h-[600px] overflow-y-auto pr-2 no-scrollbar">${stepsHtml}</div>
                            <div class="grid grid-cols-2 sm:grid-cols-5 gap-3 pt-4 border-t border-slate-200">
                                <button onclick="openModal('stage')" class="flex flex-col items-center p-3 bg-white rounded-xl border border-slate-200 hover:bg-slate-50 transition text-xs font-medium"><i class="ph ph-flag text-2xl mb-1 text-slate-500"></i> Etapa</button>
                                <button onclick="openModal('info')" class="flex flex-col items-center p-3 bg-white rounded-xl border border-slate-200 hover:bg-blue-50 transition text-xs font-medium"><i class="ph ph-info text-2xl mb-1 text-blue-500"></i> Info</button>
                                <button onclick="openModal('quiz')" class="flex flex-col items-center p-3 bg-white rounded-xl border border-slate-200 hover:bg-purple-50 transition text-xs font-medium"><i class="ph ph-list-checks text-2xl mb-1 text-purple-500"></i> Test</button>
                                <button onclick="openModal('question')" class="flex flex-col items-center p-3 bg-white rounded-xl border border-slate-200 hover:bg-indigo-50 transition text-xs font-medium"><i class="ph ph-question text-2xl mb-1 text-indigo-500"></i> Pregunta</button>

        function handleTriggerUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > 600) { h = Math.round(h * 600 / w); w = 600; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    document.getElementById('modalInputTriggerB64').value = canvas.toDataURL('image/jpeg', 0.8);
                    
                    const tCanvas = document.createElement('canvas');
                    tCanvas.width = 16; tCanvas.height = 16;
                    tCanvas.getContext('2d').drawImage(img, 0, 0, 16, 16);
                    document.getElementById('modalInputTriggerTemplate').value = tCanvas.toDataURL('image/jpeg', 0.8);
                    
                    const preview = document.getElementById('triggerPreview');
                    preview.src = canvas.toDataURL('image/jpeg', 0.8);
                    preview.style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function renderMedia(step) {
            if (!step.mediaType || step.mediaType === 'none' || !step.mediaUrl) return '';
            
            const isDark = step.type === 'stage';
            const borderColor = isDark ? 'border-slate-600' : 'border-slate-200';
            const bgColor = isDark ? 'bg-slate-700' : 'bg-slate-50';
            const textColor = isDark ? 'text-emerald-400' : 'text-slate-500';

            if (step.mediaType === 'image') {
                return `<img src="${step.mediaUrl}" class="w-full h-auto max-h-64 object-cover rounded-xl mb-6 shadow-sm border ${borderColor}" onerror="this.style.display='none'">`;
            } else if (step.mediaType === 'video') {
                const embedUrl = getEmbedUrl(step.mediaUrl);
                if (embedUrl.includes('youtube') || embedUrl.includes('vimeo')) {
                    return `<div class="video-container mb-6 shadow-sm border ${borderColor} rounded-xl overflow-hidden"><iframe src="${embedUrl}" frameborder="0" allowfullscreen></iframe></div>`;
                } else {
                    return `<video src="${step.mediaUrl}" controls class="w-full max-h-64 rounded-xl mb-6 bg-black shadow-sm border ${borderColor}"></video>`;
                }
            } else if (step.mediaType === 'audio') {
                return `
                    <div class="${bgColor} border ${borderColor} p-4 rounded-xl mb-6 flex flex-col items-center gap-3 w-full shadow-sm">
                        <i class="ph-duotone ph-headphones text-4xl ${textColor}"></i>
                        <audio src="${step.mediaUrl}" controls class="w-full outline-none"></audio>

            } else if (step.mediaType === '3d') {
                return `
                    <div class="mb-6 relative group w-full shadow-sm">

                `;
            }
            return '';
        }

        function verifyGeoPosition() {
            const btn = document.getElementById('verifyBtn');
            btn.innerHTML = `<i class="ph ph-spinner animate-spin"></i> Verificant...`;
            btn.disabled = true;

            const tour = state.tours.find(t => t.id === state.playState.tourId);
            const step = tour.steps[state.playState.currentStep];

            if (!navigator.geolocation) {
                showDialog("La geolocalització no és compatible amb aquest dispositiu.");
                btn.innerHTML = `<i class="ph-bold ph-crosshair"></i> Validar Ubicació`;
                btn.disabled = false;
                return;
            }

            navigator.geolocation.getCurrentPosition(pos => {
                const dist = getDistanceFromLatLonInM(pos.coords.latitude, pos.coords.longitude, step.targetLat, step.targetLng);
                const radius = step.targetRadius || 30;
                if (dist <= radius) {
                    state.playState.geoVerified = true;
                    renderView();
                } else {
                    const remaining = Math.round(dist - radius);
                    showDialog(`Encara sou lluny. Us falten uns ${remaining > 0 ? remaining : Math.round(dist)} metres per arribar a la zona de validació.`);
                    btn.innerHTML = `<i class="ph-bold ph-crosshair"></i> Validar Ubicació`;
                    btn.disabled = false;
                }
            }, err => {
                showDialog("No s'ha pogut obtenir la vostra ubicació. Reviseu els permisos.");
                btn.innerHTML = `<i class="ph-bold ph-crosshair"></i> Validar Ubicació`;
                btn.disabled = false;
            }, { enableHighAccuracy: true });
        }

        function getDistanceFromLatLonInM(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function openModal(type, editIndex = null) {
            state.modalState = { isOpen: true, type, editIndex, tempQuizOptions: [] };
            if (type === 'quiz' || type === 'survey' || type === 'sort') {
                const editData = editIndex !== null ? state.draftTour.steps[editIndex] : {};
                state.modalState.tempQuizOptions = editData.options || editData.correctOrder || ['', ''];
                state.modalState.tempQuizCorrect = editData.correct !== undefined ? editData.correct : 0;
            }
            renderModal();
            setTimeout(() => { if (document.getElementById('modalTourTitle')) document.getElementById('modalTourTitle').focus(); else if (document.getElementById('modalInput1')) document.getElementById('modalInput1').focus(); }, 100);
        }
        
        function closeModal() { if (mapInstance) { mapInstance.remove(); mapInstance = null; } state.modalState.isOpen = false; renderModal(); }

        function saveStepFromModal() {
            const type = state.modalState.type;
            const editIndex = state.modalState.editIndex;
            let stepData = { 
                type, 
                mediaType: document.getElementById('modalMediaSelect')?.value || 'none',
                mediaUrl: document.getElementById('modalMediaUrl')?.value.trim() || '',
                hasGeo: document.getElementById('modalHasGeo')?.checked || (type === 'find_spot'),
                targetLat: parseFloat(document.getElementById('modalInputLat')?.value),
                targetLng: parseFloat(document.getElementById('modalInputLng')?.value),
                targetRadius: parseInt(document.getElementById('modalRadius')?.value) || 30
            };

            const v1 = document.getElementById('modalInput1')?.value.trim();
            if (type === 'stage') stepData.title = v1;
            else if (type === 'info') stepData.content = v1;
            else if (type === 'quiz') {
                stepData.question = v1;
                stepData.options = state.modalState.tempQuizOptions.map((o,i)=>document.getElementById('opt'+i).value.trim());
                stepData.correct = parseInt(document.querySelector('input[name="correctOpt"]:checked')?.value || 0);
                stepData.scoreFirstTry = parseInt(document.getElementById('modalScore1').value);
                stepData.scoreNextTries = parseInt(document.getElementById('modalScore2').value);
            } else if (type === 'question') {
                stepData.question = v1;
                stepData.validAnswers = document.getElementById('modalInput2').value.split('\n').map(a=>a.trim().toLowerCase());
            } else if (type === 'sort') {
                stepData.instruction = v1;
                stepData.correctOrder = state.modalState.tempQuizOptions.map((o,i)=>document.getElementById('opt'+i).value.trim());
                stepData.scoreFirstTry = parseInt(document.getElementById('modalScore1').value);
                stepData.scoreNextTries = parseInt(document.getElementById('modalScore2').value);
            } else if (type === 'find_spot') {
                stepData.locationHint = v1;
            } else if (type === 'mission') {
                stepData.instruction = v1;
            } else if (type === 'scan_code') {
                stepData.instruction = v1;
                stepData.code = document.getElementById('modalInput2')?.value.trim() || '';
            } else if (type === 'ar_exp') {
                const arType = document.getElementById('modalInputArType').value;
                const arUrl = document.getElementById('modalInputArUrl').value.trim();
                const arText = document.getElementById('modalInputArText').value.trim();
                
                const triggerImageB64 = document.getElementById('modalInputTriggerB64').value;
                const triggerTemplateB64 = document.getElementById('modalInputTriggerTemplate').value;

                if(!v1) return showDialog("Falta escriure la instrucció de l'experiència de Realitat Augmentada.");
                if(!triggerImageB64 && editIndex === null) return showDialog("Heu d'afegir una Imatge d'Activació (Trigger) pujant un fitxer.");
                if(arType !== 'text' && !arUrl) return showDialog("Falta afegir la URL del recurs multimèdia escollit.");
                if(arType === 'text' && !arText) return showDialog("Falta escriure el text del missatge ocult flotant.");

                stepData.instruction = v1;
                stepData.triggerImageB64 = triggerImageB64;
                stepData.triggerTemplateB64 = triggerTemplateB64;
                stepData.arType = arType;
                stepData.arContent = arType === 'text' ? arText : arUrl;
            } else if (type === 'survey') {
                stepData.question = v1;
                stepData.options = state.modalState.tempQuizOptions.map((o,i)=>document.getElementById('opt'+i)?.value.trim() || '');
            }

            if (editIndex !== null) {
                if (type === 'ar_exp' && !stepData.triggerImageB64) {
                    stepData.triggerImageB64 = state.draftTour.steps[editIndex].triggerImageB64;
                    stepData.triggerTemplateB64 = state.draftTour.steps[editIndex].triggerTemplateB64;
                }
                state.draftTour.steps[editIndex] = stepData;
            }
            else state.draftTour.steps.push(stepData);
            
            closeModal();
            renderView();
        }

        function moveSortItem(i, d) { const arr = state.playState.currentSortOrder; const j = i + d; if (j>=0 && j<arr.length) { [arr[i], arr[j]] = [arr[j], arr[i]]; renderView(); } }

        function removeQuizOption(i) { state.modalState.tempQuizOptions.splice(i, 1); renderModal(); }

        function startCreation() { state.draftTour = { id: null, title: '', description: '', steps: [], trackingUrl: '' }; navigateTo('create'); }
        function editTour(id) { state.draftTour = JSON.parse(JSON.stringify(state.tours.find(t=>t.id===id))); navigateTo('create'); }
        
        function finalizeSaveTour(downloadAsJson = false, keepEditing = false) {
            const titleEl = document.getElementById('modalTourTitle');
            const descEl = document.getElementById('modalTourDesc');
            const trackEl = document.getElementById('modalTourTracking');
            
            if (titleEl) state.draftTour.title = titleEl.value.trim();
            if (descEl) state.draftTour.description = descEl.value.trim();
            if (trackEl) state.draftTour.trackingUrl = trackEl.value.trim();
            
            if (!state.draftTour.title) {
                return showDialog("Cal afegir un títol a la ruta abans de desar-la.");
            }
            if (state.draftTour.steps.length === 0) {
                return showDialog("Cal afegir almenys un contingut o etapa a la ruta.");
            }
            
            let savedTour;
            if (state.draftTour.id && !state.draftTour.id.startsWith('temp-')) {
                const index = state.tours.findIndex(t => t.id === state.draftTour.id);
                if (index !== -1) {
                    state.tours[index] = { ...state.draftTour };
                    savedTour = state.tours[index];
                } else {
                    savedTour = { ...state.draftTour };
                    state.tours.push(savedTour);
                }
            } else { 
                state.draftTour.id = 'r-' + Date.now(); 
                savedTour = { ...state.draftTour };
                state.tours.push(savedTour); 
            }

            if (downloadAsJson && savedTour) {
                triggerDownloadJSON(savedTour);
                if (keepEditing) {
                    showDialog("El fitxer JSON s'ha descarregat correctament. Podeu continuar editant la ruta.");
                    return; 
                }
            }

            closeModal();
            navigateTo('list');
        }

        function triggerDownloadJSON(tourObj) {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify([tourObj], null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `${(tourObj.title || 'ruta').replace(/[^a-z0-9]/gi, '_').toLowerCase()}_rutaviva.json`);
            document.body.appendChild(dl); 
            dl.click();
            dl.remove();
        }

        function generateAutonomousHTML() {
            const titleEl = document.getElementById('modalTourTitle');
            const descEl = document.getElementById('modalTourDesc');
            const trackEl = document.getElementById('modalTourTracking');
            
            if (titleEl) state.draftTour.title = titleEl.value.trim();
            if (descEl) state.draftTour.description = descEl.value.trim();
            if (trackEl) state.draftTour.trackingUrl = trackEl.value.trim();
            
            if (!state.draftTour.title) return showDialog("Cal afegir un títol a la ruta.");
            if (state.draftTour.steps.length === 0) return showDialog("Cal afegir almenys un contingut o etapa a la ruta.");

            let tourToExport = { ...state.draftTour, id: 'r-' + Date.now() };
            
            let htmlContent = document.documentElement.outerHTML;
            
            const scriptToInject = `
                // Codi injectat per generar l'experiència autònoma
                window.onload = () => {
                    state.tours = [${JSON.stringify(tourToExport)}];
                    state.view = 'play';
                    state.playState = { 
                        tourId: '${tourToExport.id}', 
                        currentStep: 0, 
                        score: 0, 
                        attempts: {}, 
                        feedbackMsg: null, 
                        geoVerified: false, 
                        maxScore: ${tourToExport.steps.reduce((a,s) => a + (s.scoreFirstTry || 10), 0)},
                        stepStartTime: Date.now(),
                        interactionLogs: []
                    };
                    renderAll();
                };
            `;
            
            htmlContent = htmlContent.replace(/window\.onload = \(\) => renderAll\(\);/, scriptToInject);
            
            const blob = new Blob(["<!DOCTYPE html>\n<html lang=\"ca\">\n" + htmlContent + "\n</html>"], {type: "text/html;charset=utf-8"});
            const dl = document.createElement('a');
            dl.href = URL.createObjectURL(blob);
            dl.download = `${tourToExport.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_rutaviva_autonoma.html`;
            document.body.appendChild(dl);
            dl.click();
            dl.remove();
            showDialog("S'ha generat i descarregat l'arxiu HTML. Aquest arxiu es pot obrir en qualsevol navegador per jugar la ruta de forma directa, i ja conté totes les dades incloses.");
        }

        // --- SISTEMA DE SEGUIMENT I RESPOSTES ---
        function logInteraction(action, answer, score) {
            const tour = state.tours.find(t => t.id === state.playState.tourId);
            if (!tour || !tour.trackingUrl) return;
            
            const step = tour.steps[state.playState.currentStep];
            const elapsed = Date.now() - (state.playState.stepStartTime || Date.now());
            
            state.playState.interactionLogs.push({
                pas: state.playState.currentStep + 1,
                tipus_activitat: step.type,
                accio: action,
                resposta: answer || '',
                puntuacio: score || 0,
                temps_segons: Math.round(elapsed / 1000),
                data_hora: new Date().toISOString()
            });
        }
        
        function sendFinalLogs() {
            const tour = state.tours.find(t => t.id === state.playState.tourId);
            if (!tour || !tour.trackingUrl || state.playState.interactionLogs.length === 0) return;
            
            const payload = {
                ruta: tour.title,
                puntuacio_total: state.playState.score,
                max_puntuacio: state.playState.maxScore,
                finalitzat: new Date().toISOString(),
                detalls: state.playState.interactionLogs
            };
            
            fetch(tour.trackingUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(e => console.log('Notes: Tracking no enviat', e));
        }

        function startTour(id) {
            const tour = state.tours.find(t=>t.id===id);
            const maxScore = tour.steps.reduce((acc, step) => {
                if (step.type === 'quiz' || step.type === 'question' || step.type === 'sort') return acc + (step.scoreFirstTry !== undefined ? step.scoreFirstTry : 10);
                return acc;
            }, 0);
            state.playState = { tourId: id, currentStep: 0, score: 0, attempts: {}, feedbackMsg: null, geoVerified: false, maxScore: maxScore, stepStartTime: Date.now(), interactionLogs: [], currentSortOrder: null };
            navigateTo('play');
        }

        function previewFromStep(i) {
            if (!state.draftTour.title) state.draftTour.title = "Previsualització";
            const id = 'temp-preview';
            const existing = state.tours.findIndex(t=>t.id===id);
            if (existing!==-1) state.tours[existing] = { ...state.draftTour, id };
            else state.tours.push({ ...state.draftTour, id });
            startTour(id);
            state.playState.currentStep = i;
            renderView();
        }

        function answerQuiz(i) {
            const step = state.tours.find(t=>t.id===state.playState.tourId).steps[state.playState.currentStep];
            if (!state.playState.attempts) state.playState.attempts = {};
            const stepIndex = state.playState.currentStep;
            if (state.playState.attempts[stepIndex] === undefined) state.playState.attempts[stepIndex] = 0;
            
            const isFirstTry = state.playState.attempts[stepIndex] === 0;
            state.playState.attempts[stepIndex]++;

            if (i === step.correct) { 
                const scoreToAdd = isFirstTry ? (step.scoreFirstTry !== undefined ? step.scoreFirstTry : 10) : (step.scoreNextTries !== undefined ? step.scoreNextTries : 5);
                state.playState.score += scoreToAdd;
                state.playState.feedbackMsg = step.successMsg || "Correcte!"; 
                state.playState.feedbackType = 'success'; 
            } else { 
                state.playState.feedbackMsg = step.errorMsg || "Incorrecte."; 
                state.playState.feedbackType = 'error'; 
            }
            logInteraction('Respon Test', step.options[i], state.playState.score);
            renderView();
        }

        function verifyText(type) {
            const input = document.getElementById('playInput').value.trim().toLowerCase();
            const step = state.tours.find(t=>t.id===state.playState.tourId).steps[state.playState.currentStep];
            
            if (!state.playState.attempts) state.playState.attempts = {};
            const stepIndex = state.playState.currentStep;
            if (state.playState.attempts[stepIndex] === undefined) state.playState.attempts[stepIndex] = 0;
            const isFirstTry = state.playState.attempts[stepIndex] === 0;
            state.playState.attempts[stepIndex]++;

            if (type === 'question') {
                if (step.validAnswers.includes(input)) { 
                    const scoreToAdd = isFirstTry ? (step.scoreFirstTry !== undefined ? step.scoreFirstTry : 10) : (step.scoreNextTries !== undefined ? step.scoreNextTries : 5);
                    state.playState.score += scoreToAdd;
                    state.playState.feedbackMsg = step.successMsg || "Molt bé!"; 
                    state.playState.feedbackType = 'success'; 
                } else { 
                    state.playState.feedbackMsg = step.errorMsg || "No és correcte."; 
                    state.playState.feedbackType = 'error'; 
                }
            } else if (type === 'scan_code') {
                if (input === step.code.toLowerCase()) {
                    state.playState.feedbackMsg = "Codi validat correctament!";
                    state.playState.feedbackType = 'success';
                } else {
                    state.playState.feedbackMsg = "Codi invàlid. Torneu a comprovar-ho.";
                    state.playState.feedbackType = 'error';
                }
            } else { 
                state.playState.score += 5; 
                state.playState.feedbackMsg = "Missió completada."; 
                state.playState.feedbackType = 'success'; 
            }
            logInteraction(type === 'question' ? 'Respon Obertament' : 'Introdueix Codi/Missió', input, state.playState.score);
            renderView();
        }

        function verifySort() {
            const step = state.tours.find(t=>t.id===state.playState.tourId).steps[state.playState.currentStep];
            const currentOrder = state.playState.currentSortOrder;
            const isCorrect = step.correctOrder.every((item, i) => item === currentOrder[i]);
            
            if (!state.playState.attempts) state.playState.attempts = {};
            const stepIndex = state.playState.currentStep;
            if (state.playState.attempts[stepIndex] === undefined) state.playState.attempts[stepIndex] = 0;
            const isFirstTry = state.playState.attempts[stepIndex] === 0;
            state.playState.attempts[stepIndex]++;

            if (isCorrect) {
                const scoreToAdd = isFirstTry ? (step.scoreFirstTry !== undefined ? step.scoreFirstTry : 10) : (step.scoreNextTries !== undefined ? step.scoreNextTries : 5);
                state.playState.score += scoreToAdd;
                state.playState.feedbackMsg = "Ordre correcte! Molt bé.";
                state.playState.feedbackType = 'success';
            } else {
                state.playState.feedbackMsg = "L'ordre no és correcte. Torneu-ho a provar.";
                state.playState.feedbackType = 'error';
            }
            logInteraction('Respon Ordenar', currentOrder.join(', '), state.playState.score);
            renderView();
        }

        function nextStep() {
            state.playState.feedbackMsg = null;
            state.playState.geoVerified = false;
            state.playState.currentSortOrder = null;
            
            const tour = state.tours.find(t=>t.id===state.playState.tourId);
            
            if (state.playState.currentStep < tour.steps.length - 1) {
                state.playState.currentStep++;
                state.playState.stepStartTime = Date.now();
                renderView();
            } else {
                sendFinalLogs();
                navigateTo('summary');
            }
        }

        function retryStep() { state.playState.feedbackMsg = null; renderView(); }
        function confirmExit() { showDialog("Vols sortir de l'experiència?", "confirm", () => navigateTo('list')); }

        // --- CÀMERA AR I DETECCIÓ VISUAL AVANÇADA ---
        function startARCamera() {
            const container = document.getElementById('ar-fullscreen-container');
            const videoElement = document.getElementById('ar-video-feed');
            const contentOverlay = document.getElementById('ar-content-overlay');
            const scanUI = document.getElementById('ar-scan-ui');
            
            const step = state.tours.find(t => t.id === state.playState.tourId).steps[state.playState.currentStep];

            document.getElementById('ar-ghost-image').src = step.triggerImageB64 || defaultB64;
            document.getElementById('ar-scan-line').classList.remove('hidden');
            document.getElementById('ar-instruction-text').innerText = "Cercant la imatge... Mantingueu el dispositiu estable apuntant al patró.";
            
            container.classList.remove('hidden');
            contentOverlay.innerHTML = ''; 
            contentOverlay.classList.add('hidden');
            scanUI.classList.remove('hidden');

            arScanActive = true;
            window.arMatchFrames = 0;

            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(stream => {
                    currentVideoStream = stream;
                    videoElement.srcObject = stream;
                    videoElement.onloadedmetadata = () => {
                        videoElement.play();
                        requestAnimationFrame(() => detectTriggerImage(step.triggerTemplateB64 || defaultB64));
                    };
                })
                .catch(err => {
                    arScanActive = false;
                    showDialog("No s'ha pogut accedir a la càmera. Assegureu-vos de donar permisos.");
                    container.classList.add('hidden');
                });
        }

        function detectTriggerImage(templateB64) {
            if (!arScanActive) return;
            
            const video = document.getElementById('ar-video-feed');
            
            if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
                if (!window.arTemplateImg) {
                    window.arTemplateImg = new Image();
                    window.arTemplateImg.src = templateB64;
                    return requestAnimationFrame(() => detectTriggerImage(templateB64));
                }
                if (!window.arTemplateData && window.arTemplateImg.complete) {
                    const c = document.createElement('canvas');
                    c.width = 16; c.height = 16;
                    c.getContext('2d').drawImage(window.arTemplateImg, 0, 0, 16, 16);
                    window.arTemplateData = c.getContext('2d').getImageData(0,0,16,16).data;
                }

                if (window.arTemplateData) {
                    const c = document.createElement('canvas');
                    c.width = 16; c.height = 16;
                    const ctx = c.getContext('2d');
                    
                    const size = Math.min(video.videoWidth, video.videoHeight);
                    const sx = (video.videoWidth - size) / 2;
                    const sy = (video.videoHeight - size) / 2;
                    
                    ctx.drawImage(video, sx, sy, size, size, 0, 0, 16, 16);
                    const videoData = ctx.getImageData(0,0,16,16).data;

                    let r1=0, g1=0, b1=0;
                    for(let i=0; i<videoData.length; i+=4) {
                        r1 += videoData[i]; g1 += videoData[i+1]; b1 += videoData[i+2];
                    }
                    r1 /= 256; g1 /= 256; b1 /= 256; 

                    let r2=0, g2=0, b2=0;
                    for(let i=0; i<window.arTemplateData.length; i+=4) {
                        r2 += window.arTemplateData[i]; g2 += window.arTemplateData[i+1]; b2 += window.arTemplateData[i+2];
                    }
                    r2 /= 256; g2 /= 256; b2 /= 256;

                    let colorDiff = Math.abs(r1-r2) + Math.abs(g1-g2) + Math.abs(b1-b2);
                    
                    if (colorDiff < 45) { 
                        window.arMatchFrames = (window.arMatchFrames || 0) + 1;
                        if (window.arMatchFrames > 15) { 
                            arScanActive = false;
                            window.arTemplateData = null;
                            window.arTemplateImg = null;
                            return revealARContent();
                        }
                    } else {
                        window.arMatchFrames = 0;
                    }
                }
            }
            
            requestAnimationFrame(() => detectTriggerImage(templateB64));
        }

        function revealARContent() {
            logInteraction('Detecta AR', 'Imatge activadora detectada', 0);
            
            const step = state.tours.find(t => t.id === state.playState.tourId).steps[state.playState.currentStep];
            document.getElementById('ar-scan-ui').classList.add('hidden');
            
            const contentOverlay = document.getElementById('ar-content-overlay');
            contentOverlay.classList.remove('hidden');

            let html = '';
            if (step.arType === '3d') {
                html = `<model-viewer src="${step.arContent}" auto-rotate camera-controls style="width:100%; height:60vh; background:transparent;" shadow-intensity="1"></model-viewer>`;
            } else if (step.arType === 'image') {
                html = `<img src="${step.arContent}" class="w-11/12 max-h-[70vh] object-contain rounded-2xl shadow-2xl border-4 border-white/80 fade-in">`;
            } else if (step.arType === 'video') {
                html = `<video src="${step.arContent}" controls autoplay class="w-11/12 rounded-2xl shadow-2xl border-4 border-white/80 fade-in"></video>`;
            } else if (step.arType === 'audio') {
                html = `
                    <div class="bg-white/90 backdrop-blur-md p-8 rounded-3xl shadow-2xl flex flex-col items-center border border-white/50 fade-in w-10/12">
                        <div class="w-24 h-24 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mb-6 animate-pulse">
                            <i class="ph-fill ph-speaker-hifi text-5xl"></i>
                        </div>
                        <audio src="${step.arContent}" controls autoplay class="w-full"></audio>
                    </div>
                `;
            } else if (step.arType === 'text') {
                html = `
                    <div class="bg-white/90 backdrop-blur-md p-8 rounded-3xl shadow-2xl w-10/12 max-h-[70vh] overflow-y-auto border border-white/50 fade-in text-center">
                        <i class="ph-duotone ph-sparkle text-4xl text-amber-500 mb-4 inline-block"></i>
                        <p class="text-xl font-bold text-slate-800 leading-relaxed">${step.arContent.replace(/\n/g, '<br>')}</p>
                    </div>
                `;
            }

            contentOverlay.innerHTML = `
                <div class="absolute inset-0 flex items-center justify-center p-4">
                    ${html}
                </div>
                <button onclick="closeARCamera(false)" class="absolute bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 bg-emerald-600 text-white font-bold rounded-full shadow-2xl border border-emerald-500 flex items-center gap-2 hover:bg-emerald-500 transition hover:scale-105">
                    Continuar endavant <i class="ph-bold ph-arrow-right"></i>
                </button>
            `;
        }

        function closeARCamera(skipNextStep = false) {
            arScanActive = false;
            if (currentVideoStream) {
                currentVideoStream.getTracks().forEach(track => track.stop());
                currentVideoStream = null;
            }
            document.getElementById('ar-fullscreen-container').classList.add('hidden');
            document.getElementById('ar-content-overlay').innerHTML = ''; 
            
            if (!skipNextStep && state.view === 'play') {
                nextStep(); 
            }
        }
    </script>
</body>
